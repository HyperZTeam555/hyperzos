      const parentD = filePath.split('/').slice(0,-1).join('/') || '/';
      const fName = filePath.split('/').pop();
      if (!fsTree[parentD]) return `<span class="term-error">${c}: ${args[0]}: No such file or directory</span>`;
      openApp('editor');
      setTimeout(() => {
        const ta = document.getElementById('editor-ta');
        const fn = document.getElementById('ed-filename');
        const content = fileContents[filePath] || '';
        if (ta) { ta.value = content; ta.dispatchEvent(new Event('input')); ta.focus(); }
        if (fn) fn.value = fName;
        const win = document.getElementById('win-editor');
        if (win) win.dataset.filePath = filePath;
        if (!fsTree[parentD][fName]) { fsTree[parentD][fName] = 'file'; fileContents[filePath] = content; }

      }, 150);

    case 'neofetch': return `<span style="color:var(--accent)">  ██╗  ██╗██╗   ██╗██████╗ ███████╗██████╗ ███████╗ ██████╗ ███████╗

                 <span style="color:var(--text-dim)">Memory:</span> 8192 MB (simulated)`;
    case 'cowsay': {
      const msg = args.join(' ') || 'Moo!';
      const line = '-'.repeat(msg.length+2);
      return escHtml(`+${line}+\n| ${msg} |\n+${line}+\n        \\   ^__^\n         \\  (oo)\\_______\n            (__)\\       )\\/\\\n                ||----w |\n                ||     ||`).replace(/\n/g,'<br>');
    }
    case 'banner': {
      const msg = (args.join(' ') || 'HyperZOS').toUpperCase().slice(0,10);
      return `<span style="color:var(--accent);font-size:16px;line-height:1.2">${msg}</span>`;
    }
    case 'calc': {
      if (!args.length) return `<span class="term-error">calc: usage: calc &lt;expression&gt;</span>`;
      try {
        const expr = args.join(' ');
        const result = Function('"use strict";return('+expr.replace(/[^0-9+\-*/.() %]/g,'')+')' )();
        return `<span style="color:var(--accent2)">${escHtml(expr)} = <strong>${result}</strong></span>`;
      } catch(e) { return `<span class="term-error">calc: invalid expression</span>`; }
    }
    case 'run': {
      if (!args[0]) return `<span class="term-error">run: usage: run &lt;file.zt&gt;\nCreate scripts with: touch myscript.zt  then  nano myscript.zt\nFor help: ztman</span>`;
      const ztPath = resolvePath(args[0]);
      const ztSrc = fileContents[ztPath];
      if (ztSrc === undefined) return `<span class="term-error">run: '${args[0]}': No such file</span>`;
      if (!ztPath.endsWith('.zt')) return `<span class="term-error">run: not a .zt script — file must end in .zt</span>`;
      return execZT(ztSrc, args.slice(1));
    }
    case 'man':
    case 'ztman': {
      // If ztman with no args, show ZyperTerm manual
      if (c === 'ztman' && !args[0]) {
        return MAN_PAGES['ztman'] || `<span class="term-error">ztman: no manual found</span>`;
      }
      if (!args[0]) return `<span class="term-error">man: what manual page do you want?\nTry: man ls   man cat   man run   ztman print   ztman if</span>`;
      const page = MAN_PAGES[args[0]];
      return page
        ? `<span style="color:var(--accent2);font-weight:600;font-size:13px">─── MAN: ${args[0].toUpperCase()} ───</span><br><br>${page.replace(/\n/g,'<br>')}`
        : `<span class="term-error">man: no manual entry for '${args[0]}'\nTry: man help   or   ztman for scripting docs</span>`;
    }
    case 'gridrunner':
    case 'game': {
      const gameSrc = fileContents['/home/user/scripts/game.zt'];
      if (gameSrc) return execZT(gameSrc, []);
      launchGridRunner(); return null;
    }
    default: {
      // Check shell aliases first
      if (shellAliases[c]) return execCmd(shellAliases[c] + (args.length ? ' '+args.join(' ') : ''));
      // Auto-run .zt
      const autoZT = resolvePath(c.endsWith('.zt') ? c : c + '.zt');
      if (fileContents[autoZT] !== undefined) return execZT(fileContents[autoZT], args);
      return `<span class="term-error">hypershell: ${escHtml(c)}: command not found — type 'help'</span>`;
    }
  }
}

// ── ZyperTerm (.zt) Interpreter ───────────────────────────────────────────────
// The ZTerminal scripting language. Files must end in .zt
// Run with: run script.zt  OR just type: scriptname
// For docs: ztman   or   man run
let _ztKeyBuffer = '';
let _ztGameGrid = null;
// Persistent ZT game state — survives after execZT returns
let _ztGameVars = null;
let _ztGameOut  = null;
let _ztRunLines = null;

function execZT(src, scriptArgs) {
  scriptArgs = scriptArgs || [];
  const out = [];
  const vars = {};
  // Expose to module level so keydown-list closures survive after execZT returns
  _ztGameVars = vars;
  _ztGameOut  = out;
  scriptArgs.forEach((a,i) => { vars[String(i+1)] = a; vars[String(i)] = a; });

  function sub(s) {
    return String(s).replace(/\$(\w+)/g, (_,n) => vars[n] !== undefined ? String(vars[n]) : '');
  }
  function resolveVal(v) {
    v = sub(v).trim();
    if ((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'"))) return v.slice(1,-1);
    if (!isNaN(v) && v !== '') return Number(v);
    return v;
  }
  function evalCond(cond) {
    const m = sub(cond).match(/^(.+?)\s*(==|!=|>=|<=|>|<)\s*(.+)$/);
    if (!m) return !!resolveVal(cond);
    const av = resolveVal(m[1].trim()), bv = resolveVal(m[3].trim());
    switch(m[2]) {
      case '==': return String(av)===String(bv);
      case '!=': return String(av)!==String(bv);
      case '>':  return Number(av)>Number(bv);
      case '<':  return Number(av)<Number(bv);
      case '>=': return Number(av)>=Number(bv);
      case '<=': return Number(av)<=Number(bv);
    }
    return false;
  }
  const COLORS = {red:'#f85149',green:'#3fb950',blue:'#58a6ff',yellow:'#d29922',cyan:'#39d5d3',magenta:'#bc8cff',white:'#f0f6fc',dim:'#8b949e'};

  function collectBlock(lines, startIdx) {
    const block = []; let depth=1, i=startIdx;
    while (i<lines.length && depth>0) {
      const t = lines[i].trim().split(/\s+/)[0];
    if (['if','loop','game-loop','keydown-list'].includes(t)) depth++;
      if (t==='end') { depth--; if (depth===0){i++;break;} }
      if (depth>0) block.push(lines[i]);
      i++;
    }
    return {lines:block, endIdx:i};
  }

  function renderGrid() {
    if (!_ztGameGrid) return '';
    const {w,h,cells,score,title,lives,statusMsg,statusColor} = _ztGameGrid;
    const top = '╔' + '═'.repeat(w*2) + '╗';
    const bot = '╚' + '═'.repeat(w*2) + '╝';
    const rows = [];
    for (let y=0;y<h;y++) {
      let row = '<span style="color:#444">║</span>';
      for (let x=0;x<w;x++) {
        const ch = cells[y*w+x]||' ';
        if      (ch==='@') row+=`<span style="color:#3fb950;font-weight:bold">@ </span>`;
        else if (ch==='#') row+=`<span style="color:#f85149;font-weight:bold"># </span>`;
        else if (ch==='$') row+=`<span style="color:#d29922;font-weight:bold">$ </span>`;
        else               row+=`<span style="color:#21262d">· </span>`;
      }
      // trim trailing space
      row = row.replace(/ <\/span>$/, '</span>');
      row += '<span style="color:#444">║</span>';
      rows.push(row);
    }
    const livesStr = lives !== undefined
      ? `  <span style="color:#f85149">${'♥'.repeat(Math.max(0,lives))}</span><span style="color:#333">${'♡'.repeat(Math.max(0,3-lives))}</span>`
      : '';
    const scoreStr = score !== undefined
      ? `  Score:<span style="color:#d29922;font-weight:bold">${score}</span>` : '';
    const titleLine = title ? `<span style="color:#58a6ff;font-weight:bold">${escHtml(title)}</span>${scoreStr}${livesStr}\n` : '';
    const statusLine = statusMsg
      ? `\n<span style="color:${statusColor||'#8b949e'}">${escHtml(statusMsg)}</span>`
      : `\n<span style="color:#555">WASD/Arrows — move  ·  Q — quit</span>`;
    return titleLine +
      `<span style="color:#444">${escHtml(top)}</span>\n` +
      rows.join('\n') + '\n' +
      `<span style="color:#444">${escHtml(bot)}</span>` +
      statusLine;
  }

  function runLines(lines) {
    _ztRunLines = runLines; // keep module ref current
    let i=0, guard=0;
    while (i<lines.length && guard++<5000) {
      const raw = lines[i++].trim();
      if (!raw || raw.startsWith('#')) continue;
      // Extract cmd from raw (unsubstituted) so $var in cmd position can't corrupt it
      const rawSp = raw.indexOf(' ');
      const cmd = rawSp<0 ? raw : raw.slice(0,rawSp);
      const rawRest = rawSp<0 ? '' : raw.slice(rawSp+1).trim();
      // Substitute variables in rest only
      const rest = sub(rawRest);
      const toks = rest.split(/\s+/);

      if (cmd==='print'||cmd==='echo') {
        const val = rest ? String(resolveVal(rest)) : '';
        out.push(escHtml(val));
      } else if (cmd==='set') {
        const m2 = rest.match(/^(\w+)\s+(.+)$/);
        if (m2) {
          const expr = m2[2];
          try { vars[m2[1]] = Function('"use strict";return('+expr.replace(/[^0-9+\-*/.() %]/g,'')+')' )(); }
          catch { vars[m2[1]] = resolveVal(m2[2]); }
        }
      } else if (cmd==='color') {
        const sp2=rest.indexOf(' ');
        const col=sp2<0?rest:rest.slice(0,sp2);
        const msg=sp2<0?'':rest.slice(sp2+1);
        out.push(`<span style="color:${COLORS[col]||col}">${escHtml(sub(msg))}</span>`);
      } else if (cmd==='hr') {
        const ch=rest&&rest[0]||'─';
        out.push(`<span style="color:var(--border)">${ch.repeat(40)}</span>`);
      } else if (cmd==='clear') {
        out.push('__CLEAR__');
      } else if (cmd==='sleep') {
        // no-op sync
      } else if (cmd==='if') {
        const block=collectBlock(lines,i); i=block.endIdx;
        if (evalCond(rest)) runLines(block.lines);
      } else if (cmd==='loop') {
        const n=Math.min(parseInt(resolveVal(rest))||0,500);
        const block=collectBlock(lines,i); i=block.endIdx;
        for (let li=0;li<n;li++){vars['i']=li; runLines(block.lines);}
      } else if (cmd==='end') {
        // no-op
      // ── Game commands ──────────────────────────────────────────────────────
      } else if (cmd==='game-init') {
        const gw=parseInt(toks[0])||8, gh=parseInt(toks[1])||8;
        _ztGameGrid={w:gw,h:gh,cells:Array(gw*gh).fill(' '),score:0,title:'',px:0,py:0};
      } else if (cmd==='game-clear') {
        if (_ztGameGrid) _ztGameGrid.cells=Array(_ztGameGrid.w*_ztGameGrid.h).fill(' ');
      } else if (cmd==='game-set') {
        if (_ztGameGrid) {
          const gx=parseInt(resolveVal(toks[0])), gy=parseInt(resolveVal(toks[1]));
          const ch=resolveVal(toks[2]||' ');
          if (gx>=0&&gx<_ztGameGrid.w&&gy>=0&&gy<_ztGameGrid.h)
            _ztGameGrid.cells[gy*_ztGameGrid.w+gx]=String(ch)[0];
        }
      } else if (cmd==='game-get') {
        if (_ztGameGrid) {
          const gx=parseInt(resolveVal(toks[0])), gy=parseInt(resolveVal(toks[1]));
          vars['cell']=(gx>=0&&gx<_ztGameGrid.w&&gy>=0&&gy<_ztGameGrid.h)?_ztGameGrid.cells[gy*_ztGameGrid.w+gx]:' ';
        }
      } else if (cmd==='game-player') {
        if (_ztGameGrid) {
          _ztGameGrid.px=parseInt(resolveVal(toks[0])); _ztGameGrid.py=parseInt(resolveVal(toks[1]));
          _ztGameGrid.cells[_ztGameGrid.py*_ztGameGrid.w+_ztGameGrid.px]='@';
        }
      } else if (cmd==='game-score') {
        if (_ztGameGrid) { _ztGameGrid.score=parseInt(resolveVal(toks[0]))||0; vars['score']=_ztGameGrid.score; }
      } else if (cmd==='game-title') {
        if (_ztGameGrid) _ztGameGrid.title=rest;
      } else if (cmd==='game-render') {
        out.push(renderGrid());
      } else if (cmd==='game-key') {
        vars['key']=_ztKeyBuffer||'';
        _ztKeyBuffer='';
      } else if (cmd==='keydown-list') {
        // Event-driven interactive game loop.
        // Collects the tick-block, then wires a keydown listener.
        // Each keypress re-runs the tick-block with $key set.
        // All .zt vars/grid state live in the closure — fully persistent.
        const block = collectBlock(lines, i); i = block.endIdx;
        const tickLines = block.lines;

        const termInput2 = document.getElementById('term-cmd');
        const termOut2   = document.getElementById('term-output');
        const lbl3       = document.getElementById('term-prompt-label');

        // One persistent div — innerHTML replaced every tick so grid updates in-place
        const gameDiv = document.createElement('div');
        gameDiv.className = 'term-line';
        gameDiv.style.cssText = 'font-family:"IBM Plex Mono",monospace;line-height:1.5;white-space:pre;';
        if (termOut2) termOut2.appendChild(gameDiv);

        let gameActive = true;

        function runTick(key) {
          if (!gameActive) return;
          vars['key'] = key;
          const tickOut = [];
          // Run tick block — capture output into tickOut
          const savedOut = out.splice(0); // stash existing out
          runLines(tickLines);
          const newOut = out.splice(0);   // grab tick output
          out.push(...savedOut);          // restore previous output

          const quit = newOut.includes('__QUIT__') || vars['_gameover'];
          const html = newOut.filter(x => x && x !== '__QUIT__').join('<br>');
          gameDiv.innerHTML = html;
          gameDiv.scrollIntoView({block:'nearest'});

          if (quit) {
            gameActive = false;
            window._grRunning = false;
            window._ztGameActive = false;
            window.removeEventListener('keydown', ztKeyHandler, true);
            if (lbl3) lbl3.textContent = `user@hyperzos:${cwd}$ `;
            const fin = document.createElement('div');
            fin.className = 'term-line';
            fin.innerHTML = `<span style="color:var(--text-dim)">Game ended. Final score: <b style="color:#d29922">${vars['score']||0}</b></span>`;
            gameDiv.after(fin);
            requestAnimationFrame(() => requestAnimationFrame(() => {
              if (termInput2) { termInput2.disabled = false; termInput2.removeAttribute('disabled'); termInput2.focus(); }
            }));
          }
        }

        function ztKeyHandler(e) {
          if (!gameActive) return;
          // Stop if terminal window closed/minimized
          const termWin = document.getElementById('win-terminal');
          if (!termWin || termWin.classList.contains('minimized')) {
            gameActive = false;
            window._grRunning = false;
            window._ztGameActive = false;
            window.removeEventListener('keydown', ztKeyHandler, true);
            if (termInput2) { termInput2.disabled = false; termInput2.removeAttribute('disabled'); }
            return;
          }
          const k = e.key.toLowerCase();
          const mapped = k==='arrowup'?'w': k==='arrowdown'?'s': k==='arrowleft'?'a': k==='arrowright'?'d': k;
          if (!['w','a','s','d','q'].includes(mapped)) return;
          e.preventDefault();
          e.stopPropagation();
          runTick(mapped);
        }

        if (termInput2) { termInput2.disabled = true; }
        if (lbl3) lbl3.textContent = '[GAME MODE] ';
        window._grRunning    = true;
        window._ztGameActive = true;
        window.addEventListener('keydown', ztKeyHandler, true);

        // Initial render — empty key just draws starting state
        runTick('');

        // Return whatever was printed before keydown-list
        return out.filter(Boolean).join('<br>');
      } else if (cmd==='game-move') {
        if (_ztGameGrid) {
          const dir=resolveVal(rest)||vars['key']||'';
          let nx=_ztGameGrid.px, ny=_ztGameGrid.py;
          if (dir==='w') ny--; else if (dir==='s') ny++;
          else if (dir==='a') nx--; else if (dir==='d') nx++;
          // Reset flags each move
          vars['hit']='0'; vars['collected']='0';
          if (nx>=0&&nx<_ztGameGrid.w&&ny>=0&&ny<_ztGameGrid.h) {
            const idx=ny*_ztGameGrid.w+nx;
            const cell=_ztGameGrid.cells[idx];
            // Clear old player position
            _ztGameGrid.cells[_ztGameGrid.py*_ztGameGrid.w+_ztGameGrid.px]=' ';
            if (cell==='#') {
              vars['hit']='1';
              // Don't move onto the hazard — bounce back, clear hazard, respawn elsewhere
              _ztGameGrid.cells[idx]=' ';
              // Stay at current position
              _ztGameGrid.cells[_ztGameGrid.py*_ztGameGrid.w+_ztGameGrid.px]='@';
            } else {
              if (cell==='$') { vars['collected']='1'; }
              _ztGameGrid.px=nx; _ztGameGrid.py=ny;
              _ztGameGrid.cells[ny*_ztGameGrid.w+nx]='@';
            }
          }
        }
      } else if (cmd==='game-place-rand') {
        // game-place-rand CHAR COUNT — place N of char at random empty cells
        if (_ztGameGrid) {
          const rch = resolveVal(toks[0])||'$';
          const rn  = parseInt(resolveVal(toks[1]))||1;
          for (let ri=0; ri<rn; ri++) {
            for (let ra=0; ra<500; ra++) {
              const rx=Math.floor(Math.random()*_ztGameGrid.w);
              const ry=Math.floor(Math.random()*_ztGameGrid.h);
              const dist=Math.abs(rx-_ztGameGrid.px)+Math.abs(ry-_ztGameGrid.py);
              if (_ztGameGrid.cells[ry*_ztGameGrid.w+rx]===' ' && dist>2) {
                _ztGameGrid.cells[ry*_ztGameGrid.w+rx]=String(rch)[0]; break;
              }
            }
          }
        }
      } else if (cmd==='game-quit') {
        out.push('__QUIT__');
        vars['_gameover'] = '1';
      } else if (cmd==='game-lives') {
        if (_ztGameGrid) {
          const lv = parseInt(resolveVal(toks[0]));
          _ztGameGrid.lives = isNaN(lv) ? 3 : lv;
          vars['lives'] = _ztGameGrid.lives;
        }
      } else if (cmd==='game-status') {
        if (_ztGameGrid) {
          const gsSp = rest.indexOf(' ');
          const sc2 = gsSp<0 ? 'dim' : rest.slice(0, gsSp);
          const sm2 = gsSp<0 ? rest : rest.slice(gsSp+1);
          _ztGameGrid.statusColor = COLORS[sc2]||sc2||'#8b949e';
          _ztGameGrid.statusMsg   = sm2;
        }
      } else {
        const r=execCmd(cmd + (rawRest ? ' '+rest : ''));
        if (r) out.push(r);
      }
    }
  }

  runLines(src.split('\n'));
  // Handle __CLEAR__ markers
  const result = out.filter(Boolean).join('<br>');
  if (result.includes('__CLEAR__')) {
    const parts = result.split('__CLEAR__');
    const termOut = document.getElementById('term-output');
    if (termOut) termOut.innerHTML='';
    return parts[parts.length-1];
  }
  return result;
}

function resolvePath(p) {
  if (!p) return cwd;
  if (p === '~') return '/home/user';
  if (p === '/') return '/';
  if (p === '..') {
    const parts = cwd.split('/').filter(Boolean);
    parts.pop();
    return parts.length === 0 ? '/' : '/' + parts.join('/');
  }
  if (p.startsWith('~/')) return '/home/user/' + p.slice(2);
  if (p.startsWith('/')) return p.replace(/\/$/, '') || '/';
  return (cwd === '/' ? '' : cwd) + '/' + p;
}

function initTerminal() {
  const input = document.getElementById('term-cmd');
  if (!input) return;
  // Focus immediately and whenever the window is clicked
  setTimeout(() => input.focus(), 80);
  const winEl = document.getElementById('win-terminal');
  if (winEl) winEl.addEventListener('mousedown', () => { if (!window._grRunning && !window._ztGameActive) setTimeout(() => input.focus(), 10); });
  addTermLine(`<span class="term-info">ZTerminal — HyperZOS Shell. Type "help" for commands, "ztman" for scripting docs.</span>`);
  addTermLine(`<span class="term-info">Logged in as user on hyperzos. Tab-completion supported.</span>`);
  const lbl = document.getElementById('term-prompt-label');
  if (lbl) lbl.textContent = `user@hyperzos:${cwd}$ `;
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim();
      input.value = '';
      if (!cmd) { scrollTerm(); return; }
      termHistory.unshift(cmd);
      termHistIdx = -1;
      addTermLine(`<span class="term-prompt">user@hyperzos:${cwd}$</span> ${escHtml(cmd)}`);
      const result = execCmd(cmd);
      if (result !== null && result !== '') addTermLine(result);
      scrollTerm();
      const lbl2 = document.getElementById('term-prompt-label');
      if (lbl2) lbl2.textContent = `user@hyperzos:${cwd}$ `;
    } else if (e.key === 'ArrowUp') {
      termHistIdx = Math.min(termHistIdx + 1, termHistory.length - 1);
      input.value = termHistory[termHistIdx] || '';
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      termHistIdx = Math.max(termHistIdx - 1, -1);
      input.value = termHistIdx >= 0 ? termHistory[termHistIdx] : '';
      e.preventDefault();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = input.value.split(' ').pop();
      const contents = fsTree[cwd];
      if (contents) {
        const matches = Object.keys(contents).filter(k => k.startsWith(partial));
        if (matches.length === 1) {
          const parts2 = input.value.split(' ');
          parts2[parts2.length-1] = matches[0];
          input.value = parts2.join(' ');
        } else if (matches.length > 1) {
          addTermLine(matches.join('  '));
          scrollTerm();
        }
      }
    } else if (e.key === 'c' && e.ctrlKey) {
      input.value = '';
      addTermLine(`<span class="term-prompt">user@hyperzos:${cwd}$</span> ^C`);
      scrollTerm();
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      const out = document.getElementById('term-output');
      if (out) out.innerHTML = '';
    }
  });
}

function addTermLine(html) {
  const out = document.getElementById('term-output');
  if (!out) return;
  const div = document.createElement('div');
  div.className = 'term-line';
  div.innerHTML = html;
  out.appendChild(div);
}
function scrollTerm() {
  const out = document.getElementById('term-output');
  if (out) out.parentElement.scrollTop = out.parentElement.scrollHeight;
}

// ========================
// GRID RUNNER GAME  (text-mode, rendered as terminal lines)
// ========================

// Kill any running game before starting a new one
window._grCleanup = null;

function launchGridRunner() {
  // If a game is already running, kill it cleanly first
  if (typeof window._grCleanup === 'function') { window._grCleanup(); window._grCleanup = null; }

  const termOut   = document.getElementById('term-output');
  const termInput = document.getElementById('term-cmd');
  if (!termOut) return;

  const COLS = 8, ROWS = 8;

  // ── state ──────────────────────────────────────────────────────────────────
  let px = 3, py = 3;
  let cells = Array(COLS*ROWS).fill(0); // 0=empty 1=coin 2=hazard
  let score = 0, lives = 3;
  let running = true;

  const gget = (x,y) => (x>=0&&x<COLS&&y>=0&&y<ROWS) ? cells[y*COLS+x] : -1;

  function placeRandom(val) {
    for (let a=0;a<500;a++) {
      const rx=Math.floor(Math.random()*COLS), ry=Math.floor(Math.random()*ROWS);
      if (cells[ry*COLS+rx]===0 && !(rx===px&&ry===py)) {
        cells[ry*COLS+rx]=val; return;
      }
    }
  }

  // ── text renderer — builds the game as HTML inside a <pre> ─────────────────
  // One persistent <div> in terminal output; we just update its innerHTML each frame
  const gameDiv = document.createElement('div');
  gameDiv.className = 'term-line';
  gameDiv.style.cssText = 'font-family:"IBM Plex Mono",monospace;line-height:1.45;margin:2px 0;';
  termOut.appendChild(gameDiv);

  function draw(statusMsg, statusColor) {
    const BORDER_H  = '─';
    const BORDER_V  = '│';
    const TL='╔', TR='╗', BL='╚', BR='╝';
    const topBar    = TL + BORDER_H.repeat(COLS*2) + TR;
    const bottomBar = BL + BORDER_H.repeat(COLS*2) + BR;
    const hearts    = '<span style="color:#f85149">'+'♥'.repeat(lives)+'</span><span style="color:#444">'+'♡'.repeat(3-lives)+'</span>';
    const scoreSpan = `<span style="color:#d29922">${score}</span>`;
    const header    = `<span style="color:#58a6ff;font-weight:bold">GRID RUNNER</span>  Score:${scoreSpan}  Lives:${hearts}`;

    let rows = '';
    for (let y=0;y<ROWS;y++) {
      let row = '<span style="color:#444">'+BORDER_V+'</span>';
      for (let x=0;x<COLS;x++) {
        if (x===px && y===py) {
          row += '<span style="color:#3fb950;font-weight:bold">@</span> ';
        } else {
          const v = cells[y*COLS+x];
          if      (v===1) row += '<span style="color:#d29922;font-weight:bold">$</span> ';
          else if (v===2) row += '<span style="color:#f85149;font-weight:bold">#</span> ';
          else            row += '<span style="color:#21262d">·</span> ';
        }
      }
      // trim trailing space before border
      row = row.replace(/ $/, '');
      row += '<span style="color:#444">'+BORDER_V+'</span>';
      rows += row + '\n';
    }

    const footerText = statusMsg
      ? `<span style="color:${statusColor||'#f85149'};font-weight:bold">${statusMsg}</span>`
      : `<span style="color:#555">WASD / Arrows — move  ·  Q — quit</span>`;

    gameDiv.innerHTML =
      header + '\n' +
      `<span style="color:#444">${topBar}</span>\n` +
      rows +
      `<span style="color:#444">${bottomBar}</span>\n` +
      footerText;

    gameDiv.scrollIntoView({block:'nearest'});
  }

  // ── move ───────────────────────────────────────────────────────────────────
  function move(dx, dy) {
    if (!running) return;
    const nx = px+dx, ny = py+dy;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) { draw(); return; }
    const cell = gget(nx,ny);
    px=nx; py=ny;
    if (cell===2) {
      lives--;
      cells[ny*COLS+nx]=0;
      placeRandom(2);
      if (lives<=0) { running=false; draw('GAME OVER! Score: '+score,'#f85149'); endGame(); return; }
      draw('Ouch! '+lives+' '+(lives===1?'life':'lives')+' left', '#f85149');
    } else if (cell===1) {
      cells[ny*COLS+nx]=0;
      score++;
      placeRandom(1);
      if (score%5===0) placeRandom(2);
      draw('+1  Score: '+score, '#3fb950');
    } else {
      draw();
    }
  }

  // ── cleanup — ALWAYS called on quit, ensures no listeners leak ─────────────
  function endGame() {
    running = false;
    window._grRunning = false;
    window._ztGameActive = false;
    window.removeEventListener('keydown', onKey, true);
    if (termInput) {
      termInput.disabled = false;
      termInput.removeAttribute('disabled');
      // Two-tick delay so focus doesn't fight the just-fired keydown event
      requestAnimationFrame(() => requestAnimationFrame(() => termInput.focus()));
    }
    const msg = document.createElement('div');
    msg.className = 'term-line';
    msg.innerHTML = `<span style="color:#f85149;font-weight:bold">▶ Game ended</span> <span style="color:#8b949e">Final score: <b style="color:#d29922">${score}</b>  —  type a command to continue</span>`;
    gameDiv.after(msg);
    msg.scrollIntoView({block:'nearest'});
  }

  // ── single keydown handler — capture phase, only active when terminal is open ──
  function onKey(e) {
    if (!running) return;
    // Only intercept keys when terminal window is open and not minimized
    const termWin = document.getElementById('win-terminal');
    if (!termWin || termWin.classList.contains('minimized') || termWin.style.display === 'none') {
      running = false;
      endGame();
      return;
    }
    const k = e.key.toLowerCase();
    if (!['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright','q'].includes(k)) return;
    e.preventDefault();
    e.stopPropagation();
    if      (k==='w'||k==='arrowup')    move( 0,-1);
    else if (k==='s'||k==='arrowdown')  move( 0, 1);
    else if (k==='a'||k==='arrowleft')  move(-1, 0);
    else if (k==='d'||k==='arrowright') move( 1, 0);
    else if (k==='q') { draw('Goodbye! Score: '+score,'#58a6ff'); endGame(); }
  }

  // ── expose cleanup so re-launch or external code can kill this game ────────
  window._grCleanup = endGame;

  // ── init ───────────────────────────────────────────────────────────────────
  placeRandom(1);
  placeRandom(2);
  window._grRunning    = true;
  window._ztGameActive = true;
  if (termInput) { termInput.disabled = true; }

  // Register at capture phase — fires before ANY other listener on the page
  window.addEventListener('keydown', onKey, true);

  draw();
}
function initEditor() {
  const ta = document.getElementById('editor-ta');
  const lines = document.getElementById('editor-lines');
  if (!ta) return;

  // Track dirty state — set when content changes after last save
  const win = document.getElementById('win-editor');
  let savedContent = ta.value;
  if (win) win.dataset.editorDirty = '0';

  function markDirty() {
    const dirty = ta.value !== savedContent;
    if (win) win.dataset.editorDirty = dirty ? '1' : '0';
    const savedEl = document.getElementById('ed-stat-saved');
    if (savedEl && dirty && savedEl.textContent === '✓ Saved') savedEl.textContent = '';
    // Show unsaved dot in title
    const titleEl = win ? win.querySelector('.window-title') : null;
    if (titleEl) {
      const base = titleEl.textContent.replace(/^● /, '');
      titleEl.textContent = dirty ? '● ' + base : base;
    }
  }

  function updateLines() {
    const n = ta.value.split('\n').length;
    lines.innerHTML = Array.from({length:n},(_,i)=>i+1).join('<br>');
    const el = document.getElementById('ed-stat-ln');
    if (el) {
      const pos = ta.selectionStart;
      const ln = ta.value.substr(0, pos).split('\n').length;
      const col = pos - ta.value.lastIndexOf('\n', pos - 1);
      el.textContent = `Ln ${ln}, Col ${col}`;
    }
    updateEditorFileType();
    markDirty();
  }

  // When a file is loaded into editor, reset dirty baseline
  if (win) {
    const observer = new MutationObserver(() => {
      savedContent = ta.value;
      if (win) win.dataset.editorDirty = '0';
      const titleEl = win.querySelector('.window-title');
      if (titleEl) titleEl.textContent = titleEl.textContent.replace(/^● /, '');
    });
    // We'll reset baseline manually via editorMarkClean()
  }
  window._editorMarkClean = () => {
    savedContent = ta.value;
    if (win) win.dataset.editorDirty = '0';
    const titleEl = win ? win.querySelector('.window-title') : null;
    if (titleEl) titleEl.textContent = titleEl.textContent.replace(/^● /, '');
  };

  ta.addEventListener('input', updateLines);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.substring(0,s) + '  ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 2;
      updateLines();
    }
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      saveEditorFile();
    }
  });
  ta.addEventListener('scroll', () => { lines.scrollTop = ta.scrollTop; });
  ta.addEventListener('click', updateLines);
  ta.addEventListener('keyup', updateLines);
  updateLines();
}

function updateEditorFileType() {
  const fn = document.getElementById('ed-filename');
  const typeEl = document.getElementById('ed-stat-type');
  if (!fn || !typeEl) return;
  const ext = fn.value.split('.').pop().toLowerCase();
  const types = { txt:'Plain Text', md:'Markdown', html:'HTML', css:'CSS', js:'JavaScript', py:'Python', json:'JSON', sh:'Shell', ts:'TypeScript', jsx:'JSX', c:'C', cpp:'C++', java:'Java' };
  typeEl.textContent = types[ext] || ext.toUpperCase();
}

function saveEditorFile() {
  const ta = document.getElementById('editor-ta');
  const fn = document.getElementById('ed-filename');
  const win = document.getElementById('win-editor');
  if (!ta || !fn) return;

  const filename = fn.value.trim() || 'untitled.txt';
  const content = ta.value;

  // Determine save path
  let savePath = win && win.dataset.filePath ? win.dataset.filePath : null;

  if (!savePath) {
    // Default save location: /home/user/<filename>
    savePath = '/home/user/' + filename;
  } else {
    // Update filename in path if filename changed
    const dir = savePath.split('/').slice(0,-1).join('/') || '/';
    const oldName = savePath.split('/').pop();
    if (oldName !== filename) {
      // Remove old entry from fsTree
      if (fsTree[dir]) delete fsTree[dir][oldName];
      savePath = dir + '/' + filename;
    }
  }

  // Save content
  fileContents[savePath] = content;

  // Ensure file is in fsTree
  const dir = savePath.split('/').slice(0,-1).join('/') || '/';
  const name = savePath.split('/').pop();
  if (!fsTree[dir]) fsTree[dir] = {};
  fsTree[dir][name] = 'file';

  // Update editor's tracked path
  if (win) win.dataset.filePath = savePath;
  if (fn) fn.value = name;

  // Show saved indicator
  const savedEl = document.getElementById('ed-stat-saved');
  if (savedEl) {
    savedEl.textContent = '✓ Saved';
    setTimeout(() => { if(savedEl) savedEl.textContent = ''; }, 2000);
  }

  notify('Editor', `Saved: ${savePath}`);
  if (window._editorMarkClean) window._editorMarkClean();
  fmRefreshIfOpen();
}

function saveEditorFileAs() {
  const fn = document.getElementById('ed-filename');
  const current = fn ? fn.value : 'untitled.txt';
  const newName = prompt('Save as (filename):', current);
  if (!newName) return;
  const win = document.getElementById('win-editor');
  // Reset filepath so it saves fresh
  if (win) win.dataset.filePath = '/home/user/' + newName.trim();
  if (fn) fn.value = newName.trim();
  saveEditorFile();
}

// CALCULATOR LOGIC
// ========================
let calcExpr = '', calcVal = '0', calcJustEq = false;

function calcInput(val) {
  if (val === 'C') { calcExpr = ''; calcVal = '0'; calcJustEq = false; }
  else if (val === '⌫') {
    calcVal = calcVal.length > 1 ? calcVal.slice(0,-1) : '0';
  }
  else if (val === '=') {
    try {
      calcExpr = calcVal + ' =';
      calcVal = String(eval(calcVal.replace(/×/g,'*').replace(/÷/g,'/')));
      calcJustEq = true;
    } catch { calcVal = 'Error'; }
  }
  else if (['+','-','×','÷','%'].includes(val)) {
    calcJustEq = false;
    calcVal += val;
  }
  else {
    if (calcJustEq) { calcVal = val; calcJustEq = false; }
    else calcVal = calcVal === '0' ? val : calcVal + val;
  }
  const dv = document.getElementById('calc-display-val');
  const de = document.getElementById('calc-display-expr');
  if (dv) dv.textContent = calcVal.length > 12 ? parseFloat(calcVal).toExponential(4) : calcVal;
  if (de) de.textContent = calcExpr;
}

// ── Pointer-based drag for file manager (Firefox + Chrome + Safari) ─────────────
// Uses mousedown/mousemove/mouseup instead of the HTML5 drag API which is
// unreliable in Firefox when items have child <span> elements.
let _fmDrag = null; // active drag state

function fmWireDrag(main, entries) {
  // Build a fast lookup: element → {name, type}
  const itemMap = new Map();
  entries.forEach(([name, type], idx) => {
    const el = main.querySelector('[data-fm-idx="' + idx + '"]');
    if (el) itemMap.set(el, { name, type });
  });

  main.addEventListener('mousedown', e => {
    // Only left-button, not on inputs/buttons
    if (e.button !== 0) return;
    const el = e.target.closest('[data-fm-idx]');
    if (!el) return;
    const info = itemMap.get(el);
    if (!info) return;

    // We don't start drag immediately — wait for DRAG_THRESHOLD pixels of movement
    const startX = e.clientX, startY = e.clientY;
    const DRAG_THRESHOLD = 6;
    let dragStarted = false;
    let ghost = null;
    let lastTarget = null;

    const onMove = ev => {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!dragStarted) {
        if (Math.sqrt(dx*dx + dy*dy) < DRAG_THRESHOLD) return;
        // Start drag
        dragStarted = true;
        _fmDrag = { name: info.name, type: info.type, fromDir: fmCwd, sourceEl: el };

        // Ghost element — clone the item visually
        ghost = el.cloneNode(true);
        ghost.id = 'fm-drag-ghost';
        ghost.style.cssText = [
          'position:fixed',
          'z-index:99999',
          'pointer-events:none',
          'opacity:0.75',
          'border-radius:6px',
          'background:rgba(88,166,255,0.18)',
          'border:1px solid rgba(88,166,255,0.5)',
          'padding:6px 10px',
          'font-size:12px',
          'color:var(--text)',
          'white-space:nowrap',
          'max-width:200px',
          'overflow:hidden',
          'text-overflow:ellipsis',
          'box-shadow:0 4px 16px rgba(0,0,0,0.5)',
          'user-select:none',
          '-webkit-user-select:none'
        ].join(';');
        document.body.appendChild(ghost);
        el.style.opacity = '0.35';
      }

      if (!dragStarted) return;

      // Move ghost
      ghost.style.left = (ev.clientX + 12) + 'px';
      ghost.style.top  = (ev.clientY + 4)  + 'px';

      // Hit-test drop targets
      ghost.style.visibility = 'hidden';
      const hit = document.elementFromPoint(ev.clientX, ev.clientY);
      ghost.style.visibility = '';

      // Check if hovering over desktop (not over any window or taskbar)
      const onDesktop = hit && (hit.id === 'desktop' || hit.closest('#desktop')) && !hit.closest('.window') && !hit.closest('#taskbar');

      // Clear previous highlight
      if (lastTarget && lastTarget !== hit) {
        lastTarget.classList.remove('fm-drag-over');
        lastTarget = null;
      }

      // Show desktop drop ghost or folder highlight
      const ddg = document.getElementById('desktop-drop-ghost');
      if (onDesktop && ddg) {
        const ICON_W = 90, ICON_H = 96;
        const rawX = ev.clientX - 41, rawY = ev.clientY - 40;
        const snapX = Math.max(14, Math.round((rawX - 14) / ICON_W) * ICON_W + 14);
        const snapY = Math.max(14, Math.round((rawY - 14) / ICON_H) * ICON_H + 14);
        document.getElementById('ddg-icon').textContent = fmGetIcon(info.name, info.type);
        document.getElementById('ddg-label').textContent = info.name.replace(/\.[^.]+$/, '') || info.name;
        ddg.style.display = 'flex';
        ddg.style.left = snapX + 'px';
        ddg.style.top  = snapY + 'px';
      } else {
        if (ddg) ddg.style.display = 'none';
        // Highlight folder/sidebar targets
        if (hit) {
          const dirEl   = hit.closest('[data-fm-idx]');
          const sidebar = hit.closest('.fm-sidebar-item');
          const targetEl = dirEl || sidebar;
          if (targetEl && targetEl !== el) {
            targetEl.classList.add('fm-drag-over');
            lastTarget = targetEl;
          }
        }
      }
    };

    const onUp = ev => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);

      if (ghost) { ghost.remove(); ghost = null; }
      el.style.opacity = '';

      // Always hide desktop ghost
      const ddg = document.getElementById('desktop-drop-ghost');
      if (ddg) ddg.style.display = 'none';

      // Clear highlights
      document.querySelectorAll('.fm-drag-over').forEach(x => x.classList.remove('fm-drag-over'));

      if (!dragStarted || !_fmDrag) { _fmDrag = null; return; }

      // Find drop target under cursor
      const hit = document.elementFromPoint(ev.clientX, ev.clientY);

      // Dropped on desktop?
      const onDesktop = hit && (hit.id === 'desktop' || hit.closest('#desktop')) && !hit.closest('.window') && !hit.closest('#taskbar') && !hit.closest('[data-fm-idx]');
      if (onDesktop) {
        const ICON_W = 90, ICON_H = 96;
        const rawX = ev.clientX - 41, rawY = ev.clientY - 40;
        const snapX = Math.max(14, Math.round((rawX - 14) / ICON_W) * ICON_W + 14);
        const snapY = Math.max(14, Math.round((rawY - 14) / ICON_H) * ICON_H + 14);
        const fname = _fmDrag.name;
        const ftype = _fmDrag.type;
        const srcPath = fmJoinPath(_fmDrag.fromDir, fname);
        const DESKTOP_DIR = '/home/user/Desktop';
        const dstPath = DESKTOP_DIR + '/' + fname;
        const key = 'file:' + dstPath;

        if (_fmDrag.fromDir === DESKTOP_DIR) {
          // Already in Desktop folder — just update position
          const existing = document.querySelector(`[data-icon-key="${CSS.escape(key)}"]`);
          if (existing) { existing.style.left = snapX + 'px'; existing.style.top = snapY + 'px'; desktopIconPositions[key] = { x: snapX, y: snapY }; }
          _fmDrag = null; return;
        }

        if (!fsTree[DESKTOP_DIR]) fsTree[DESKTOP_DIR] = {};
        if (fsTree[DESKTOP_DIR][fname]) { notify('Desktop', `"${fname}" already on Desktop`); _fmDrag = null; return; }

        // Move file into Desktop folder
        fmMoveItem(_fmDrag.fromDir, fname, ftype, DESKTOP_DIR);

        // Record desired position so syncDesktopFromFS places it correctly
        desktopIconPositions[key] = { x: snapX, y: snapY };
        syncDesktopFromFS();
        notify('Desktop', `"${fname}" added to Desktop`);
        _fmDrag = null; return;
      }

      if (hit) {
        // Dropped onto a folder in main area?
        const dirEl = hit.closest('[data-fm-idx]');
        if (dirEl && dirEl !== el) {
          const tidx = parseInt(dirEl.getAttribute('data-fm-idx'));
          const entries2 = Object.entries(fsTree[fmCwd] || {});
          if (tidx >= 0 && tidx < entries2.length) {
            const [tName, tType] = entries2[tidx];
            if (tType === 'dir' && tName !== _fmDrag.name) {
              fmMoveItem(_fmDrag.fromDir, _fmDrag.name, _fmDrag.type, fmJoinPath(fmCwd, tName));
              _fmDrag = null; return;
            }
          }
        }

        // Dropped onto a sidebar item?
        const sItem = hit.closest('.fm-sidebar-item');
        if (sItem) {
          const oc = sItem.getAttribute('onclick') || '';
          const m  = oc.match(/fmNavigate\('([^']+)'\)/);
          if (m) {
            const destPath = m[1];
            if (destPath !== _fmDrag.fromDir) {
              fmMoveItem(_fmDrag.fromDir, _fmDrag.name, _fmDrag.type, destPath);
              _fmDrag = null; return;
            }
          }
        }

        // Dropped on empty main area
        const mainArea = hit.closest('#fm-main-area');
        if (mainArea && !dirEl) {
          if (_fmDrag.fromDir !== fmCwd) {
            fmMoveItem(_fmDrag.fromDir, _fmDrag.name, _fmDrag.type, fmCwd);
          }
        }
      }

      _fmDrag = null;
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

function fmRender() {
  const main = document.getElementById('fm-main-area');
  const pathEl = document.getElementById('fm-path');
  const status = document.getElementById('fm-statusbar');
  const backBtn = document.getElementById('fm-back-btn');
  const fwdBtn = document.getElementById('fm-fwd-btn');
  if (!main) return;
  if (pathEl) pathEl.value = fmCwd;
  if (backBtn) backBtn.style.opacity = fmHistIdx > 0 ? '1' : '0.4';
  if (fwdBtn) fwdBtn.style.opacity = fmHistIdx < fmHistory.length - 1 ? '1' : '0.4';

  const contents = fsTree[fmCwd] || {};
  const entries = Object.entries(contents);

  // Update sidebar active states
  document.querySelectorAll('.fm-sidebar-item').forEach(el => {
    const oc = el.getAttribute('onclick') || '';
    el.classList.toggle('active', oc.includes(`'${fmCwd}'`));
  });

  if (fmViewGrid) {
    main.innerHTML = `<div class="fm-grid" id="fm-grid-inner">${entries.length === 0
      ? '<div style="color:var(--text-dim);font-size:11px;padding:20px;grid-column:1/-1">This folder is empty</div>'
      : entries.map(([name, type], idx) => `
        <div class="fm-item ${fmSelected===name?'selected':''}" data-fm-idx="${idx}">
          <span class="fm-icon">${fmGetIcon(name, type)}</span>
          <span>${escHtml(name)}</span>
        </div>`).join('')
    }</div>`;
  } else {
    main.innerHTML = `
      <div style="display:flex;padding:4px 8px 2px;font-size:10px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,0.06);gap:0;user-select:none">
        <span style="flex:1">Name</span><span style="width:90px">Type</span><span style="width:60px;text-align:right">Size</span>
      </div>
      <div id="fm-list-inner" style="padding:2px">${entries.length === 0
        ? '<div style="color:var(--text-dim);font-size:11px;padding:12px">This folder is empty</div>'
        : entries.map(([name, type], idx) => {
            const fp = fmJoinPath(fmCwd, name);
            const size = type==='file' && fileContents[fp] ? fileContents[fp].length + ' B' : '—';
            return `<div class="fm-list-row ${fmSelected===name?'fm-list-selected':''}" data-fm-idx="${idx}">
              <span style="font-size:15px;flex-shrink:0;margin-right:8px">${fmGetIcon(name, type)}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(name)}</span>
              <span style="width:90px;color:var(--text-dim);font-size:10px">${type === 'dir' ? 'Folder' : getFileType(name)}</span>
              <span style="width:60px;color:var(--text-dim);font-size:10px;text-align:right">${size}</span>
            </div>`;
          }).join('')
      }</div>`;
  }

  // Wire click/dblclick on every item
  entries.forEach(([name, type], idx) => {
    const el = main.querySelector('[data-fm-idx="' + idx + '"]');
    if (!el) return;
    el.addEventListener('click',    e => { e.stopPropagation(); fmSelect(name); });
    el.addEventListener('dblclick', e => { e.stopPropagation(); fmOpen(name, type); });
  });

  // ── Pure-JS pointer drag (works identically in Firefox, Chrome, Safari) ──────
  // State lives outside so mousemove/mouseup on document can access it
  fmWireDrag(main, entries);


  if (status) {
    const dirs = entries.filter(([,t])=>t==='dir').length;
    const files = entries.filter(([,t])=>t==='file').length;
    status.textContent = `${dirs} folder${dirs!==1?'s':''}, ${files} file${files!==1?'s':''} · ${fmCwd}`;
  }
}

function fmSelect(name) {
  fmSelected = name;
  // Update selection visually without full re-render
  const main = document.getElementById('fm-main-area');
  if (!main) return;
  main.querySelectorAll('[data-fm-idx]').forEach(el => {
    el.classList.remove('selected', 'fm-list-selected');
  });
  const contents = fsTree[fmCwd] || {};
  const entries = Object.entries(contents);
  const idx = entries.findIndex(([n]) => n === name);
  if (idx >= 0) {
    const el = main.querySelector(`[data-fm-idx="${idx}"]`);
    if (el) el.classList.add(fmViewGrid ? 'selected' : 'fm-list-selected');
  }
}

function fmJoinPath(dir, name) {
  if (dir === '/') return '/' + name;
  return dir + '/' + name;
}

function fmOpen(name, type) {
  const fullPath = fmJoinPath(fmCwd, name);
  fmOpenPath(fullPath, type);
}

function fmOpenPath(fullPath, type) {
  const name = fullPath.split('/').pop();
  if (type === 'dir') {
    openApp('files'); setTimeout(() => fmNavigate(fullPath), 150);
  } else if (name.endsWith('.zt')) {
    openApp('terminal');
    setTimeout(() => {
      const relPath = fullPath.startsWith('/home/user/') ? fullPath.replace('/home/user/', '') : fullPath;
      const result = execCmd('run ' + relPath);
      if (result) addTermLine(result);
      scrollTerm();
    }, 200);
  } else {
    fmShowFilePreview(fullPath);
  }
}

function fmShowFilePreview(path) {
  const name = path.split('/').pop();
  const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
  const content = fileContents[path];

  // .html files: render live in browser using the per-tab system
  if (ext === 'html') {
    openApp('browser');
    setTimeout(() => loadBrowserUrl('file://' + path), 150);
    return;
  }

  // .lnk shortcut files: launch the app — content is the app ID
  if (ext === 'lnk') {
    const appId = (fileContents[path] || '').trim() || name.replace('.lnk', '').toLowerCase();
    const app = apps.find(a => a.id === appId || a.name.toLowerCase() === appId.toLowerCase() || a.name === appId);
    if (app) { openApp(app.id); return; }
    notify('Files', `Unknown shortcut: ${name}`);
    return;
  }

  // Image/binary files — just notify
  const binaryExts = ['jpg','jpeg','png','gif','webp','mp3','mp4','wav','ogg','zip','tar','gz'];
  if (binaryExts.includes(ext)) {
    notify('Files', `Cannot preview binary file: ${name}`);
    return;
  }

  // Open any text content (even empty string) in editor
  const textContent = content !== undefined ? content : '';
  openApp('editor');
  setTimeout(() => {
    const ta = document.getElementById('editor-ta');
    const fn = document.getElementById('ed-filename');
    if (ta) { ta.value = textContent; ta.dispatchEvent(new Event('input')); }
    if (fn) fn.value = name;
    const win = document.getElementById('win-editor');
    if (win) win.dataset.filePath = path;
    // Ensure file exists in tree for future saves
    const dir = path.split('/').slice(0,-1).join('/') || '/';
    if (fsTree[dir] && !fsTree[dir][name]) {
      fsTree[dir][name] = 'file';
      if (fileContents[path] === undefined) fileContents[path] = '';
    }
    // Reset dirty flag — file just loaded, no unsaved changes
    if (window._editorMarkClean) window._editorMarkClean();
    notify('Editor', `Opened: ${name}`);
  }, 150);
}

function fmGoBack() {
  if (fmHistIdx > 0) { fmHistIdx--; fmNavigate(fmHistory[fmHistIdx], false); }
}
function fmGoForward() {
  if (fmHistIdx < fmHistory.length - 1) { fmHistIdx++; fmNavigate(fmHistory[fmHistIdx], false); }
}
function fmGoUp() {
  if (fmCwd === '/') return;
  const parts = fmCwd.split('/').filter(Boolean);
  parts.pop();
  fmNavigate(parts.length === 0 ? '/' : '/' + parts.join('/'));
}
function fmToggleView() {
  fmViewGrid = !fmViewGrid;
  const btn = document.getElementById('fm-view-btn');
  if (btn) btn.textContent = fmViewGrid ? '⊞' : '≡';
  fmRender();
}

// Refresh file manager if open
function fmRefreshIfOpen() {

}

// Move an item from one directory to another
function fmMoveItem(fromDir, name, type, toDir) {
  if (fromDir === toDir) return;
  const srcPath = fmJoinPath(fromDir, name);
  const dstPath = fmJoinPath(toDir, name);
  // Check destination dir exists
  if (fsTree[toDir] === undefined) { notify('Files', `Destination not found: ${toDir}`); return; }
  // Check name conflict
  if (fsTree[toDir][name]) { notify('Files', `"${name}" already exists in destination.`); return; }
  // Move in fsTree
  const itemType = fsTree[fromDir][name];
  delete fsTree[fromDir][name];
  fsTree[toDir][name] = itemType;
  // If file, move content
  if (type === 'file' || itemType === 'file') {
    if (fileContents[srcPath] !== undefined) {
      fileContents[dstPath] = fileContents[srcPath];
      delete fileContents[srcPath];
    }
  }
  // If dir, recursively update fsTree keys
  if (type === 'dir' || itemType === 'dir') {
    fmMoveSubtree(srcPath, dstPath);
  }
  fmRender();
  syncDesktopFromFS();
  notify('Files', `Moved "${name}" to ${toDir}`);
}

function fmMoveSubtree(oldBase, newBase) {
  // Move the directory entry
  if (fsTree[oldBase] !== undefined) {
    fsTree[newBase] = fsTree[oldBase];
    delete fsTree[oldBase];
    // Recurse into children
    Object.entries(fsTree[newBase] || {}).forEach(([childName, childType]) => {
      const oldChild = fmJoinPath(oldBase, childName);
      const newChild = fmJoinPath(newBase, childName);
      if (childType === 'file') {
        if (fileContents[oldChild] !== undefined) { fileContents[newChild] = fileContents[oldChild]; delete fileContents[oldChild]; }
      } else {
        fmMoveSubtree(oldChild, newChild);
      }
    });
  }
}

function showFmCtxMenu(x, y, name, type) {

  const ext = name ? name.split('.').pop().toLowerCase() : '';

      } else if (isEditable && !isHtml) {
        items.push({ label: '✏️ Open in Editor', action: () => fmShowFilePreview(path) });
      }
      if (isHtml) {
        items.push({ label: '🌐 Open in Browser', action: () => fmShowFilePreview(path) });
        items.push({ label: '✏️ Edit in Editor', action: () => {
          openApp('editor');

          }, 150);
        }});
      }
      items.push({ label: '📄 Duplicate', action: () => fmDuplicateItem(name, type) });
      items.push({ label: '📋 Copy Path', action: () => { try { navigator.clipboard.writeText(path); } catch(ex){} notify('Files', 'Path copied'); } });

}

function fmDuplicateItem(name, type) {
  if (!fsTree[fmCwd]) return;
  const srcPath = fmJoinPath(fmCwd, name);
  // Find a unique name
  const dotIdx = name.lastIndexOf('.');
  const base = dotIdx > 0 ? name.slice(0, dotIdx) : name;
  const ext2  = dotIdx > 0 ? name.slice(dotIdx) : '';
  let copyName = base + ' copy' + ext2;
  let n = 2;
  while (fsTree[fmCwd][copyName]) { copyName = base + ' copy ' + n + ext2; n++; }
  if (type === 'file') {
    fsTree[fmCwd][copyName] = 'file';
    fileContents[fmJoinPath(fmCwd, copyName)] = fileContents[srcPath] || '';
  } else {
    fsTree[fmCwd][copyName] = 'dir';
    const dstPath = fmJoinPath(fmCwd, copyName);
    fsTree[dstPath] = {};
    fmCopySubtree(srcPath, dstPath);
  }
  fmSelected = copyName;
  fmRender();
  notify('Files', 'Duplicated as "' + copyName + '"');
}

function fmCopySubtree(srcBase, dstBase) {
  const children = fsTree[srcBase];
  if (!children) return;
  Object.entries(children).forEach(([childName, childType]) => {
    const sc = fmJoinPath(srcBase, childName);
    const dc = fmJoinPath(dstBase, childName);
    if (childType === 'file') {
      if (!fsTree[dstBase]) fsTree[dstBase] = {};
      fsTree[dstBase][childName] = 'file';
      fileContents[dc] = fileContents[sc] || '';
    } else {
      if (!fsTree[dstBase]) fsTree[dstBase] = {};
      fsTree[dstBase][childName] = 'dir';
      fsTree[dc] = {};
      fmCopySubtree(sc, dc);
    }
  });
}

function fmMoveToPrompt(name, type) {
  const dest = prompt('Move "' + name + '" to path:', fmCwd);
  if (!dest || !dest.trim()) return;
  const destTrimmed = dest.trim();
  if (fsTree[destTrimmed] === undefined) {
    notify('Files', 'Destination not found: ' + destTrimmed);
    return;
  }
  if (destTrimmed === fmCwd) { notify('Files', 'Already in this folder'); return; }
  fmMoveItem(fmCwd, name, type, destTrimmed);
}

async function fmRenameItem(name, type) {
  const newName = await osPrompt('Rename', name);
  if (!newName || newName === name) return;
  const dir = fmCwd;
  if (fsTree[dir][newName]) { notify('Files', `"${newName}" already exists`); return; }
  const oldPath = fmJoinPath(dir, name);
  const newPath = fmJoinPath(dir, newName);
  const itemType = fsTree[dir][name];
  delete fsTree[dir][name];
  fsTree[dir][newName] = itemType;
  if (type === 'file') {
    if (fileContents[oldPath] !== undefined) { fileContents[newPath] = fileContents[oldPath]; delete fileContents[oldPath]; }
  } else {
    fmMoveSubtree(oldPath, newPath);
  }
  fmSelected = newName;
  fmRender();
  syncDesktopFromFS();
  notify('Files', `Renamed to "${newName}"`);
}

async function fmDeleteItem(name, type) {
  const ok = await osConfirm('Delete "' + name + '"?', 'This cannot be undone.');
  if (!ok) return;
  const path = fmJoinPath(fmCwd, name);
  delete fsTree[fmCwd][name];
  if (type === 'file') { delete fileContents[path]; }
  else { fmDeleteSubtree(path); }
  if (fmSelected === name) fmSelected = null;
  fmRender();
  syncDesktopFromFS();
  notify('Files', `Deleted "${name}"`);
}

function fmDeleteSubtree(basePath) {
  const children = fsTree[basePath];
  if (children) {
    Object.entries(children).forEach(([cName, cType]) => {
      const cp = fmJoinPath(basePath, cName);
      if (cType === 'file') delete fileContents[cp];
      else fmDeleteSubtree(cp);
    });
    delete fsTree[basePath];
  }
}

async function fmCreateFolder() {
  const name = await osPrompt('New Folder', 'New Folder');
  if (!name) return;
  if (!fsTree[fmCwd]) fsTree[fmCwd] = {};
  if (fsTree[fmCwd][name]) { notify('Files', '"' + name + '" already exists'); return; }
  const newPath = fmJoinPath(fmCwd, name);
  fsTree[fmCwd][name] = 'dir';
  fsTree[newPath] = {};
  fmSelected = name;
  fmRender();
  notify('Files', 'Created folder "' + name + '"');
}

async function fmCreateFile(ext) {
  const raw = await osPrompt('New File', 'new-file.' + (ext || 'txt'));
  if (!raw) return;
  const name = raw.trim();
  if (!name) return;
  if (!fsTree[fmCwd]) fsTree[fmCwd] = {};
  if (fsTree[fmCwd][name]) { notify('Files', '"' + name + '" already exists'); return; }
  const path = fmJoinPath(fmCwd, name);
  const realExt = name.includes('.') ? name.split('.').pop().toLowerCase() : (ext || '');
  const templates = {
    html: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>New Page</title>\n</head>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>',
    js: '// New JavaScript file\nconsole.log("Hello from HyperZOS!");',
    py: '# New Python file\nprint("Hello from HyperZOS!")',
    css: '/* New CSS file */\nbody {\n  background: #0d1117;\n  color: #c9d1d9;\n}',
    md: '# New Document\n\nStart writing here.',
    txt: '',
  };
  fsTree[fmCwd][name] = 'file';
  fileContents[path] = templates[realExt] !== undefined ? templates[realExt] : '';
  fmSelected = name;
  fmRender();
  notify('Files', 'Created "' + name + '"');
  // Open in editor after render
  setTimeout(() => fmShowFilePreview(path), 80);
}

function brRewriteHtml(html, baseUrl) {
  const bridge =
    `<base href="${baseUrl}">` +
    `<script>(function(){` +
    `document.addEventListener('click',function(e){var t=e.target;while(t&&t.tagName!=='A')t=t.parentElement;if(!t||!t.href)return;e.preventDefault();window.parent.postMessage({type:'BR_NAV',url:t.href},'*');},{capture:true});` +
    `document.addEventListener('submit',function(e){e.preventDefault();var f=e.target,action=f.action||location.href,method=(f.method||'get').toLowerCase();if(method==='get'){var q=new URLSearchParams(new FormData(f)).toString();window.parent.postMessage({type:'BR_NAV',url:action+(action.indexOf('?')>=0?'&':'?')+q},'*');}else{window.parent.postMessage({type:'BR_NAV',url:action},'*');}},{capture:true});` +
    `window.open=function(u){window.parent.postMessage({type:'BR_NAV',url:u},'*');return null;};` +
    `window.parent.postMessage({type:'BR_URL',url:location.href},'*');` +
    `})();<\/script>`;

  html = html.replace(/<meta[^>]+http-equiv\s*=\s*["']?x-frame-options["']?[^>]*>/gi, '');
  html = html.replace(/<meta[^>]+http-equiv\s*=\s*["']?content-security-policy["']?[^>]*>/gi, '');

  if (/<head[\s>]/i.test(html))       html = html.replace(/(<head[^>]*>)/i, '$1' + bridge);
  else if (/<html[\s>]/i.test(html))  html = html.replace(/(<html[^>]*>)/i, '$1' + bridge);
  else                                 html = bridge + html;
  return html;
}

function brShowFailed(tabId, url) {
  brHideLoading(tabId);
  const wrap = document.getElementById('browser-frames-wrap');
  /* Remove existing frame and replace with a fresh srcdoc one */
  const old = document.getElementById('browser-frame-' + tabId);
  if (old) old.remove();
  const frame = document.createElement('iframe');
  frame.id = 'browser-frame-' + tabId;
  frame.className = 'browser-tab-frame active';
  frame.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups');
  if (wrap) wrap.appendChild(frame);
  const failHtml =
    '<html><body style="background:#0d1117;color:#c9d1d9;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;margin:0;">' +

    '<a href="' + url + '" target="_blank" style="color:#58a6ff;font-size:12px;margin-top:4px;">Open in new tab ↗</a>' +

  const tab = browserTabs.find(t => t.id === tabId);

function brFallbackIframe(tabId, url) {
  /* Always create a fresh iframe — mutating srcdoc→src fires spurious load events */
  const wrap = document.getElementById('browser-frames-wrap');
  const old = document.getElementById('browser-frame-' + tabId);
  if (old) { try { old.srcdoc = ''; } catch(ex){} old.remove(); }

  const frame = document.createElement('iframe');
  frame.id = 'browser-frame-' + tabId;
  frame.className = 'browser-tab-frame active';
  frame.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation allow-top-navigation-by-user-activation');
  frame.setAttribute('referrerpolicy', 'no-referrer');
  if (wrap) wrap.appendChild(frame);
  else { brShowFailed(tabId, url); return; }

  let settled = false;
  const timer = setTimeout(() => {
    if (settled) return; settled = true; brShowFailed(tabId, url);
  }, 12000);

  frame.addEventListener('load', () => {
    if (settled) return; settled = true;
    clearTimeout(timer); brHideLoading(tabId);
    const tab = browserTabs.find(t => t.id === tabId);
    if (tab) tab.loaded = true;
  });
  frame.addEventListener('error', () => {
    if (settled) return; settled = true;
    clearTimeout(timer); brShowFailed(tabId, url);
  });

  frame.src = url;
}

function loadBrowserUrl(url, _retry, _tabId) {
  const tabId = _tabId !== undefined ? _tabId : activeTabId;
  _retry = _retry || 0;

  let full = url;
  if (full && !full.startsWith('http') && !full.startsWith('file://')) full = 'https://' + full;

  if (brIsGG(full)) { brFeedDecoy(full); return; }

  const tab = browserTabs.find(t => t.id === tabId);
  if (!tab) return;

  /* file:// — use srcdoc from local fileContents */
  if (full.startsWith('file://')) {
    const path = full.replace('file://', '');
    const content = fileContents[path];
    const frame = getOrCreateTabFrame(tabId);
    tab.url = full;
    tab.loaded = true;
    updateBrowserUrlBar();
    if (content !== undefined) frame.srcdoc = content;
    renderBrowserTabs();
    return;
  }

  tab.url = full;
  tab.loaded = false;
  updateBrowserUrlBar();

  const frame = getOrCreateTabFrame(tabId);
  const wrap = document.getElementById('browser-frames-wrap');
  if (wrap) wrap.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  frame.classList.add('active');

  brShowLoading(tabId, full);
  renderBrowserTabs();

  const proxyUrl = BR_PROXY_LIST[brProxyIndex] + encodeURIComponent(full);
  const capturedTabId = tabId;

  fetch(proxyUrl)
    .then(function(res) {
      if (!res.ok && _retry < BR_PROXY_LIST.length - 1) {
        brProxyIndex = (_retry + 1) % BR_PROXY_LIST.length;
        loadBrowserUrl(full, _retry + 1, capturedTabId);
        return null;
      }
      if (!res.ok) { brFallbackIframe(capturedTabId, full); return null; }
      const ct = res.headers.get('content-type') || '';
      if (ct && !ct.includes('text/html') && !ct.includes('text/plain') && !ct.includes('application/xhtml')) {
        brHideLoading(capturedTabId);
        const f2 = document.getElementById('browser-frame-' + capturedTabId);
        if (f2) {
          f2.srcdoc =
            `<html><body style="background:#0d1117;color:#c9d1d9;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;margin:0;">` +
            `<div style="font-size:40px">📄</div><div>Non-HTML content</div>` +
            `<a href="${full}" target="_blank" style="color:#58a6ff;">Open directly ↗</a></body></html>`;
        }
        const t2 = browserTabs.find(t => t.id === capturedTabId);
        if (t2) t2.loaded = true;
        return null;
      }
      return res.text();
    })
    .then(function(html) {
      if (html === null || html === undefined) return;
      if (brIsGG(html.substring(0, 2000))) { brFeedDecoy(full); brHideLoading(capturedTabId); return; }
      const rewritten = brRewriteHtml(html, full);
      const f3 = document.getElementById('browser-frame-' + capturedTabId);
      if (f3) {
        f3.srcdoc = rewritten;
        f3.style.opacity = '0';
      }
      brHideLoading(capturedTabId);
      if (f3) f3.style.opacity = '1';
      const t3 = browserTabs.find(t => t.id === capturedTabId);
      if (t3) { t3.loaded = true; t3.title = full.replace(/^https?:\/\//, '').split('/')[0]; }
      renderBrowserTabs();
      if (capturedTabId === activeTabId) updateBrowserUrlBar();
    })
    .catch(function() {
      if (_retry < BR_PROXY_LIST.length - 1) {
        brProxyIndex = (_retry + 1) % BR_PROXY_LIST.length;
        loadBrowserUrl(full, _retry + 1, capturedTabId);
        return;
      }
      brFallbackIframe(capturedTabId, full);
    });
}

function updateBrowserUrlBar() {
  const bar = document.getElementById('browser-url-bar');
  const tab = browserTabs.find(t => t.id === activeTabId);
  if (bar && tab) bar.value = tab.url || '';
}

/* 1ms GoGuardian check on active browser frame */
function brStartGGCheck() {
  if (brGGTimer) return;
  brGGTimer = setInterval(function() {
    if (brIntercepting) return;
    const frame = document.getElementById('browser-frame-' + activeTabId);
    if (!frame) return;
    let href = '', docUrl = '';
    try { href = frame.contentWindow && frame.contentWindow.location && frame.contentWindow.location.href; } catch(e) {}
    try { docUrl = frame.contentWindow && frame.contentWindow.document && frame.contentWindow.document.URL; } catch(e) {}
    const check = (href || '') + ' ' + (docUrl || '');
    if (brIsGG(check)) {
      brIntercepting = true;
      frame.style.visibility = 'hidden';
      brFeedDecoy(href || docUrl || '');
      const tab = browserTabs.find(t => t.id === activeTabId);
      const lastGood = tab ? tab.url : '';
      setTimeout(function() {
        if (lastGood) { tab.loaded = false; loadBrowserUrl(lastGood, 0, activeTabId); }
        else if (frame) { frame.srcdoc = ''; frame.removeAttribute('src'); }
        frame.style.visibility = '';
        brIntercepting = false;
      }, 50);
    }
  }, 1);
}

/* postMessage bridge from inside browser iframes */
window.addEventListener('message', function(e) {
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === 'BR_NAV' && e.data.url) {
    if (brIsGG(e.data.url)) { brFeedDecoy(e.data.url); return; }
    loadBrowserUrl(e.data.url, 0, activeTabId);
  }
  if (e.data.type === 'BR_URL' && e.data.url) {
    const tab = browserTabs.find(t => t.id === activeTabId);
    const u = e.data.url;
    if (tab && !brIsGG(u) && u !== 'about:srcdoc' && u !== 'about:blank' && !u.startsWith('about:')) {
      tab.url = u; updateBrowserUrlBar();
    }
  }
});

function browserNav() {
  const raw = document.getElementById('browser-url-bar').value.trim();
  if (!raw) return;
  const isUrl = raw.startsWith('http') || raw.startsWith('https://') || raw.startsWith('file://') || (raw.indexOf('.') !== -1 && !raw.includes(' ') && !/^[^.]+$/.test(raw));
  if (isUrl) {
    loadBrowserUrl(raw);
  } else if (isNoproxySearch(raw)) {
    /* NoProxy engine — open direct in iframe via fallback (no proxy fetch) */
    brFallbackIframe(activeTabId, getSearchUrl(raw));
  } else {
    loadBrowserUrl(getSearchUrl(raw));
  }
}

function getOrCreateTabFrame(id, showNewtab) {
  const wrap = document.getElementById('browser-frames-wrap');
  if (!wrap) return null;
  let frame = document.getElementById('browser-frame-' + id);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = 'browser-frame-' + id;
    frame.className = 'browser-tab-frame';
    frame.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
    frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation allow-top-navigation-by-user-activation');
    if (showNewtab) frame.srcdoc = NEWTAB_SRCDOC;
    wrap.appendChild(frame);
  }
  return frame;
}

function closeBrowserSettingsMenu() {
  const menu = document.getElementById('browser-settings-menu');
  if (!menu || !menu.classList.contains('open')) return;
  menu.classList.add('closing');
  menu.addEventListener('animationend', () => {
    menu.classList.remove('open', 'closing');
  }, { once: true });
  setTimeout(() => menu.classList.remove('open', 'closing'), 300);
}

function toggleBrowserSettingsMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('browser-settings-menu');
  if (!menu) return;
  if (menu.classList.contains('open')) {
    closeBrowserSettingsMenu();
  } else {
    menu.classList.remove('closing');
    menu.classList.add('open');
  }
}

function attachBrowserDragHandles() {
  const win = document.getElementById('win-browser');
  if (!win) return;
  const SKIP = ['browser-tab','browser-tab-add','browser-vtab-item','browser-vtab-add',
                'browser-broken-btn','browser-settings-btn','browser-settings-menu',
                'browser-go','toggle','tbtn','browser-nav-btn'];
  function shouldSkip(el) {
    if (!el) return false;
    if (['INPUT','BUTTON'].includes(el.tagName)) return true;
    return SKIP.some(cls => el.classList.contains(cls) || el.closest('.' + cls));
  }
  function addHandle(handle) {
    if (!handle) return;
    handle.style.cursor = 'default';
    let dragging = false, sx, sy, wx, wy;
    handle.addEventListener('mousedown', e => {
      if (shouldSkip(e.target)) return;
      dragging = true;
      sx = e.clientX; sy = e.clientY;
      wx = win.offsetLeft; wy = win.offsetTop;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      win.style.left = (wx + e.clientX - sx) + 'px';
      win.style.top  = Math.max(0, wy + e.clientY - sy) + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; });
  }
  addHandle(document.getElementById('browser-tabs-wrapper'));
  addHandle(document.getElementById('browser-vtab-sidebar'));
}

function applyVerticalTabs(on) {
  browserSettings.verticalTabs = on;
  const layout = document.getElementById('browser-layout');
  const hbar   = document.getElementById('browser-tabs-wrapper');
  if (!layout) return;
  /* Remove existing sidebar if any */
  const existing = layout.querySelector('.browser-vtab-sidebar');
  if (existing) existing.remove();
  if (on) {
    if (hbar) hbar.classList.add('hidden');
    const sidebar = document.createElement('div');
    sidebar.className = 'browser-vtab-sidebar';
    sidebar.id = 'browser-vtab-sidebar';
    sidebar.innerHTML = `
      <div class="browser-vtab-sidebar-header"><span>Tabs</span></div>
      <div class="browser-vtab-list" id="browser-vtab-list">
        <!-- tabs injected here, new tab btn appended after each tab by renderVTabs -->
      </div>
      <div class="browser-vtab-footer">
        <button class="browser-broken-btn" onclick="bfrReloadDirect()" title="Re-embed without proxy" style="width:100%;margin:0;border-radius:0;border-left:none;border-right:none;border-bottom:none;text-align:left;padding:8px 12px">⚠ Website Broken?</button>
      </div>
    `;
    layout.insertBefore(sidebar, layout.firstChild);
    renderVTabs();
    /* Re-attach drag handle to new sidebar */
    setTimeout(attachBrowserDragHandles, 0);
  } else {
    if (hbar) {
      hbar.classList.remove('hidden');
      /* Debug: force inline style to guarantee visibility */
      hbar.style.display = 'flex';
      hbar.style.minHeight = '32px';
    }
    renderBrowserTabs();
  }
}

function renderVTabs() {
  const list = document.getElementById('browser-vtab-list');
  if (!list) return;
  const currentIds = new Set(browserTabs.map(t => t.id));
  /* Remove departed tabs */
  Array.from(list.querySelectorAll('.browser-vtab-item[data-tab-id]')).forEach(el => {
    const id = parseInt(el.dataset.tabId);
    if (!currentIds.has(id) && !el.classList.contains('tab-closing')) {
      el.classList.add('tab-closing');
      el.addEventListener('animationend', () => el.remove(), { once: true });
      setTimeout(() => { if (el.parentNode) el.remove(); }, 300);
    }
  });
  /* Remove old new-tab btn — will re-append at end */
  const oldAddBtn = list.querySelector('.browser-vtab-add');
  if (oldAddBtn) oldAddBtn.remove();

  /* Add/update tabs */
  browserTabs.forEach(t => {
    let el = list.querySelector('.browser-vtab-item[data-tab-id="' + t.id + '"]');
    if (!el) {
      el = document.createElement('div');
      el.className = 'browser-vtab-item';
      el.dataset.tabId = t.id;
      el.innerHTML = `<span class="vtab-favicon">${t.favicon || '🌐'}</span><span class="vtab-title">${escHtml((t.title||'New Tab').substring(0,22))}</span><span class="vtab-close">✕</span>`;
      el.addEventListener('click', () => switchBrowserTab(t.id));
      el.querySelector('.vtab-close').addEventListener('click', e => { e.stopPropagation(); closeBrowserTab(t.id); });
      list.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.add('tab-opening');
        el.addEventListener('animationend', () => el.classList.remove('tab-opening'), { once: true });
      });
    }
    const fav = el.querySelector('.vtab-favicon'); if (fav) fav.textContent = t.favicon || '🌐';
    const ttl = el.querySelector('.vtab-title');   if (ttl) ttl.textContent = escHtml((t.title||'New Tab').substring(0,22));
    el.classList.toggle('active', t.id === activeTabId);
  });

  /* New Tab button always after the last tab */
  const addBtn = document.createElement('div');
  addBtn.className = 'browser-vtab-add';
  addBtn.innerHTML = '<span style="font-size:16px;line-height:1">+</span><span>New Tab</span>';
  addBtn.addEventListener('click', newBrowserTab);
  list.appendChild(addBtn);
}

function _makeBrowserTabEl(t) {
  const el = document.createElement('div');
  el.className = 'browser-tab';
  el.dataset.tabId = t.id;
  el.title = t.title || 'New Tab';
  el.innerHTML = `<span style="font-size:12px">${t.favicon || '🌐'}</span><span style="overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${escHtml((t.title || 'New Tab').substring(0,20))}</span><span class="tab-close">✕</span>`;
  el.addEventListener('click', () => switchBrowserTab(t.id));
  el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); closeBrowserTab(t.id); });
  return el;
}

function renderBrowserTabs() {
  const container = document.getElementById('browser-tabs-bar');
  if (!container) return;
  const brokenBtn = container.querySelector('.browser-broken-btn');
  const currentIds = new Set(browserTabs.map(t => t.id));

  /* Remove stale add button — will re-add at end */
  const oldAdd = container.querySelector('.browser-tab-add');
  if (oldAdd) oldAdd.remove();

  /* Remove tabs that no longer exist — animate out */
  Array.from(container.querySelectorAll('.browser-tab[data-tab-id]')).forEach(el => {
    const id = parseInt(el.dataset.tabId);
    if (!currentIds.has(id) && !el.classList.contains('tab-closing')) {
      el.classList.add('tab-closing');
      el.addEventListener('animationend', () => el.remove(), { once: true });
      setTimeout(() => { if (el.parentNode) el.remove(); }, 300);
    }
  });

  /* Add new tabs / update existing ones */
  browserTabs.forEach(t => {
    let el = container.querySelector('.browser-tab[data-tab-id="' + t.id + '"]');
    if (!el) {
      el = _makeBrowserTabEl(t);
      container.insertBefore(el, brokenBtn || null);
      /* Animate in on next frame */
      requestAnimationFrame(() => {
        el.classList.add('tab-opening');
        el.addEventListener('animationend', () => el.classList.remove('tab-opening'), { once: true });
      });
    }
    /* Update title/favicon in case they changed */
    const iconEl = el.querySelector('span:first-child');
    const titleEl = el.querySelector('span:nth-child(2)');
    if (iconEl) iconEl.textContent = t.favicon || '🌐';
    if (titleEl) titleEl.textContent = escHtml((t.title || 'New Tab').substring(0, 20));
    el.title = t.title || 'New Tab';
    /* Toggle active */
    el.classList.toggle('active', t.id === activeTabId);
  });

  /* Re-add the + button before the broken button */
  const addBtn = document.createElement('div');
  addBtn.className = 'browser-tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'New Tab';
  addBtn.addEventListener('click', newBrowserTab);
  container.insertBefore(addBtn, brokenBtn || null);
  /* Also sync vertical sidebar if open */
  if (browserSettings.verticalTabs) renderVTabs();
}

function switchBrowserTab(id) {
  activeTabId = id;
  const tab = browserTabs.find(t => t.id === id);
  updateBrowserUrlBar();
  const wrap = document.getElementById('browser-frames-wrap');
  if (wrap) wrap.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  if (!tab) { renderBrowserTabs(); return; }
  /* Get or create iframe — show newtab srcdoc if no URL yet */
  const frame = getOrCreateTabFrame(id, !tab.url);
  if (frame) frame.classList.add('active');
  if (tab.url && !tab.loaded) loadBrowserUrl(tab.url, 0, id);
  renderBrowserTabs();
}

function newBrowserTab() {
  const id = tabIdCounter++;
  browserTabs.push({ id, title: 'New Tab', url: '', favicon: '🌐', loaded: false });
  activeTabId = id;
  const wrap = document.getElementById('browser-frames-wrap');
  if (wrap) wrap.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  const frame = getOrCreateTabFrame(id, true); /* true = show newtab page */
  if (frame) frame.classList.add('active');
  const urlbar = document.getElementById('browser-url-bar');
  if (urlbar) urlbar.value = '';
  renderBrowserTabs();
}

function closeBrowserTab(id) {
  /* Remove the iframe and its loader */
  const frame = document.getElementById('browser-frame-' + id);
  if (frame) { try { frame.srcdoc = ''; frame.removeAttribute('src'); } catch(e) {} frame.remove(); }
  const loader = document.getElementById('br-loader-' + id);
  if (loader) loader.remove();

  if (browserTabs.length === 1) {
    browserTabs[0].url = ''; browserTabs[0].title = 'New Tab'; browserTabs[0].loaded = false;
    switchBrowserTab(browserTabs[0].id); return;
  }
  browserTabs = browserTabs.filter(t => t.id !== id);
  if (activeTabId === id) activeTabId = browserTabs[browserTabs.length - 1].id;
  switchBrowserTab(activeTabId);
}

function bfrBack() {
  const frame = document.getElementById('browser-frame-' + activeTabId);
  if (frame) try { frame.contentWindow.history.back(); } catch(e) {}
}
function bfrForward() {
  const frame = document.getElementById('browser-frame-' + activeTabId);
  if (frame) try { frame.contentWindow.history.forward(); } catch(e) {}
}
function bfrReload() {
  const tab = browserTabs.find(t => t.id === activeTabId);
  if (tab && tab.url) { tab.loaded = false; loadBrowserUrl(tab.url, 0, activeTabId); }
}

function bfrReloadDirect() {
  const tab = browserTabs.find(t => t.id === activeTabId);
  if (!tab || !tab.url) return;
  const url = tab.url;
  const tabId = activeTabId;

  brShowLoading(tabId, url);

  /* Remove old frame entirely and create a fresh one with src= (not srcdoc)
     Mutating srcdoc→src on an existing iframe fires spurious load events in Firefox */
  const wrap = document.getElementById('browser-frames-wrap');
  const oldFrame = document.getElementById('browser-frame-' + tabId);
  if (oldFrame) { try { oldFrame.srcdoc = ''; } catch(ex){} oldFrame.remove(); }

  const frame = document.createElement('iframe');
  frame.id = 'browser-frame-' + tabId;
  frame.className = 'browser-tab-frame active';
  frame.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation allow-top-navigation-by-user-activation');
  frame.setAttribute('referrerpolicy', 'no-referrer');
  if (wrap) wrap.appendChild(frame);

  let settled = false;
  const timer = setTimeout(() => {
    if (settled) return;
    settled = true;
    brShowFailed(tabId, url);
  }, 14000);

  frame.addEventListener('load', () => {
    if (settled) return;
    settled = true;
    clearTimeout(timer);
    brHideLoading(tabId);
    tab.loaded = true;
  });
  frame.addEventListener('error', () => {
    if (settled) return;
    settled = true;
    clearTimeout(timer);
    brShowFailed(tabId, url);
  });

  /* Set src after appending so load event fires reliably in Firefox */
  frame.src = url;
}
