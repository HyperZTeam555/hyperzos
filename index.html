        <button class="music-btn main" id="music-play-btn" onclick="toggleMusic()">▶</button>
        <button class="music-btn" onclick="nextTrack()">⏭</button>
      </div>
    </div>
  `;
}

function buildSettings() {
  return `
    <div class="settings-body">
      <div class="settings-nav">
        <div class="settings-nav-item active" onclick="showSettingsPanel('appearance')">🎨 Appearance</div>
        <div class="settings-nav-item" onclick="showSettingsPanel('system')">🖥️ System</div>
        <div class="settings-nav-item" onclick="showSettingsPanel('network')">🌐 Network</div>
        <div class="settings-nav-item" onclick="showSettingsPanel('about')">ℹ️ About</div>
      </div>
      <div class="settings-panel" id="settings-panel-content">
        ${buildAppearanceSettings()}
      </div>
    </div>
  `;
}

function showSettingsPanel(panel) {
  const el = document.getElementById('settings-panel-content');
  document.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
  event.target.classList.add('active');
  if (!el) return;
  if (panel === 'appearance') el.innerHTML = buildAppearanceSettings();
  if (panel === 'system') el.innerHTML = `<div class="settings-section-title">System</div>
    <div class="settings-item"><div><div class="settings-item-label">Animations</div><div class="settings-item-desc">Enable UI animations</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="settings-item"><div><div class="settings-item-label">Notifications</div><div class="settings-item-desc">Show system notifications</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="settings-item"><div><div class="settings-item-label">Auto-updates</div></div><div class="toggle" onclick="this.classList.toggle('on')"></div></div>`;
  if (panel === 'network') el.innerHTML = `<div class="settings-section-title">Network</div>
    <div class="settings-item"><div><div class="settings-item-label">Wi-Fi</div><div class="settings-item-desc">ClaudeNet_5G</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="settings-item"><div><div class="settings-item-label">Bluetooth</div></div><div class="toggle" onclick="this.classList.toggle('on')"></div></div>`;
  if (panel === 'about') el.innerHTML = `<div class="settings-section-title">About HyperZOS</div>
    <div class="settings-item"><div class="settings-item-label">Version</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent)">1.0.0 (Build 2025.1)</div></div>
    <div class="settings-item"><div class="settings-item-label">Kernel</div><div style="font-size:11px;color:var(--text-dim)">6.8.2-hyperzos</div></div>
    <div class="settings-item"><div class="settings-item-label">Memory</div><div style="font-size:11px;color:var(--text-dim)">8 GB simulated</div></div>
    <div class="settings-item"><div class="settings-item-label">Built with</div><div style="font-size:11px;color:var(--text-dim)">HTML5 + Vanilla JS</div></div>`;
}

function buildAppearanceSettings() {
  return `<div class="settings-section-title">Appearance</div>
    <div class="settings-item"><div><div class="settings-item-label">Dark Mode</div><div class="settings-item-desc">Use dark theme</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="settings-item"><div><div class="settings-item-label">Blur Effects</div><div class="settings-item-desc">Background blur on windows</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    <div class="settings-item" style="flex-direction:column;align-items:flex-start;gap:8px"><div class="settings-item-label">Accent Color</div><div class="settings-color-row">
      <div class="color-dot selected" style="background:#58a6ff" onclick="setAccent('#58a6ff',this)"></div>
      <div class="color-dot" style="background:#3fb950" onclick="setAccent('#3fb950',this)"></div>
      <div class="color-dot" style="background:#f78166" onclick="setAccent('#f78166',this)"></div>
      <div class="color-dot" style="background:#e3b341" onclick="setAccent('#e3b341',this)"></div>
      <div class="color-dot" style="background:#a371f7" onclick="setAccent('#a371f7',this)"></div>
    </div></div>`;
}

function setAccent(color, el) {
  document.documentElement.style.setProperty('--accent', color);
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  notify('Appearance', 'Accent color updated!');
}

function buildClock() {
  return `
    <div class="clock-body">
      <div class="clock-digital" id="clock-digital">00:00:00</div>
      <div class="clock-date" id="clock-date-display"></div>
      <canvas class="clock-canvas" id="analog-clock" width="180" height="180"></canvas>
    </div>
  `;
}

// ========================
// EDITOR HELPERS
// ========================
function insertText(before, after) {
  const ta = document.getElementById('editor-ta');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0,s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus();
}

function newEditorFile() {
  const ta = document.getElementById('editor-ta');
  const fn = document.getElementById('ed-filename');
  if (ta) ta.value = '';
  if (fn) fn.value = 'untitled.txt';
}

function copyEditorContent() {
  const ta = document.getElementById('editor-ta');
  if (ta) { navigator.clipboard.writeText(ta.value).then(() => notify('Editor', 'Content copied to clipboard!')); }
}

function seekMusic(e) {
  const bar = e.currentTarget;
  const pct = e.offsetX / bar.offsetWidth * 100;
  musicProgress = pct;
  updateMusicProgress();
}

// ========================
// NOTIFICATIONS
// ========================
function notify(title, body) {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${escHtml(title)}</div><div class="notif-body">${escHtml(body)}</div>`;
  container.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity 0.4s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
}

// ========================
// START MENU
// ========================
function toggleStartMenu() {
  const menu = document.getElementById('start-menu');
  menu.classList.toggle('open');
}
function closeStartMenu() {
  document.getElementById('start-menu').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) closeStartMenu();
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
});

// ========================
// CONTEXT MENU
// ========================
function showCtxMenu(x, y, items) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = items.map(item =>
    item.sep ? '<div class="ctx-sep"></div>'
             : `<div class="ctx-item" onclick="(${item.action.toString()})()">${item.label}</div>`
  ).join('');
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
  menu.style.display = 'block';
}
function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }

// ========================
// SHUTDOWN
// ========================
function shutdown() {
  closeStartMenu();
  const boot = document.getElementById('boot');
  boot.classList.remove('hidden');
  boot.style.opacity = '1';
  boot.style.transition = 'opacity 0.4s';
  boot.innerHTML = `
    <div class="boot-logo" style="color:var(--accent3);font-size:28px">Shutting down...</div>
    <div class="boot-sub" style="margin-top:8px">HyperZOS — Goodbye</div>
  `;
  // After 1s, show power-on button
  setTimeout(() => {
    boot.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
        <div class="boot-logo" style="color:var(--text-dim);font-size:22px;letter-spacing:0.15em">SYSTEM OFF</div>
        <button id="power-on-btn" onclick="powerOn()" style="
          width:64px;height:64px;border-radius:50%;
          background:radial-gradient(circle at 35% 35%, #1f3a52, #0d1117);
          border:2px solid rgba(88,166,255,0.4);
          color:var(--accent);font-size:26px;cursor:pointer;
          box-shadow:0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6);
          transition:all 0.2s;display:flex;align-items:center;justify-content:center;
        " onmouseover="this.style.boxShadow='0 0 32px rgba(88,166,255,0.5), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.8)'"
           onmouseout="this.style.boxShadow='0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.4)'">
          ⏻
        </button>
        <div style="font-size:11px;color:var(--text-dim);letter-spacing:0.1em">Press to turn on</div>
      </div>
    `;
  }, 1200);
}

function powerOn() {
  const boot = document.getElementById('boot');
  boot.innerHTML = `
    <div class="boot-logo">HyperZOS</div>
    <div class="boot-sub">Version 1.0.0 · Kernel 6.8.2</div>
    <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
    <div class="boot-ver">© 2025 HyperZOS Systems. All rights reserved.</div>
  `;
  setTimeout(() => document.getElementById('boot-bar').style.width = '100%', 50);
  setTimeout(() => {
    boot.classList.add('hidden');
    // Show login screen
    const login = document.getElementById('login-screen');
    login.classList.remove('login-screen-hidden');
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').style.display = 'none';
    setTimeout(() => document.getElementById('login-password').focus(), 100);
  }, 2400);
}

// ========================
// UTILS
// ========================
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initNotes() {
  renderNotesList();
  selectNote(activeNote);
}
</script>
</body>
</html>
