let browserTabs = [{ id: 1, title: 'New Tab', url: '', favicon: '🌐' }];
let activeTabId = 1;
let tabIdCounter = 2;

function browserNav() {
  const raw = document.getElementById('browser-url-bar').value.trim();
  if (!raw) return;
  const isUrl = raw.startsWith('http') || raw.startsWith('file://') || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/|$)/.test(raw);
  loadBrowserUrl(isUrl ? raw : 'https://yep.com/web?q=' + encodeURIComponent(raw));
}

function loadBrowserUrl(url) {
  let full = url;
  if (url && !url.startsWith('http') && !url.startsWith('file://')) full = 'https://' + url;
  const tab = browserTabs.find(t => t.id === activeTabId);
  if (!tab) return;
  tab.url = full;
  tab.title = full.startsWith('file://') ? full.split('/').pop() : full.replace(/^https?:\/\//, '').split('/')[0];
  const urlbar = document.getElementById('browser-url-bar');
  if (urlbar) urlbar.value = full;
  // Show/hide new-tab page vs the tab's iframe
  const newtab = document.getElementById('browser-newtab-page');
  if (newtab) newtab.style.display = 'none';
  // Get or create iframe for this tab
  const frame = getOrCreateTabFrame(activeTabId);
  document.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  frame.classList.add('active');
  if (full.startsWith('file://')) {
    frame.src = 'about:blank';
    // file:// uses srcdoc from fileContents
    const path = full.replace('file://', '');
    const content = fileContents[path];
    if (content !== undefined) frame.srcdoc = content;
  } else {
    frame.removeAttribute('srcdoc');
    frame.src = full;
  }
  renderBrowserTabs();
}

function getOrCreateTabFrame(id) {
  const wrap = document.getElementById('browser-frames-wrap');
  if (!wrap) return null;
  let frame = document.getElementById('browser-frame-' + id);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = 'browser-frame-' + id;
    frame.className = 'browser-tab-frame';
    frame.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
    wrap.appendChild(frame);
  }
  return frame;
}

function renderBrowserTabs() {
  const container = document.getElementById('browser-tabs-bar');
  if (!container) return;
  container.innerHTML = '';
  browserTabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'browser-tab' + (t.id === activeTabId ? ' active' : '');
    el.title = t.title || 'New Tab';
    el.innerHTML = `<span style="font-size:12px">${t.favicon || '🌐'}</span><span style="overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${escHtml((t.title || 'New Tab').substring(0,20))}</span><span class="tab-close">✕</span>`;
    el.addEventListener('click', () => switchBrowserTab(t.id));
    el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); closeBrowserTab(t.id); });
    container.appendChild(el);
  });
  const addBtn = document.createElement('div');
  addBtn.className = 'browser-tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'New Tab';
  addBtn.addEventListener('click', newBrowserTab);
  container.appendChild(addBtn);
}

function switchBrowserTab(id) {
  activeTabId = id;
  const tab = browserTabs.find(t => t.id === id);
  const urlbar = document.getElementById('browser-url-bar');
  if (urlbar && tab) urlbar.value = tab.url || '';
  const newtab = document.getElementById('browser-newtab-page');
  // Hide all frames
  document.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  if (!tab || !tab.url) {
    if (newtab) newtab.style.display = 'flex';
  } else {
    if (newtab) newtab.style.display = 'none';
    const frame = getOrCreateTabFrame(id);
    if (frame) frame.classList.add('active');
  }
  renderBrowserTabs();
}

function newBrowserTab() {
  const id = tabIdCounter++;
  browserTabs.push({ id, title: 'New Tab', url: '', favicon: '🌐' });
  activeTabId = id;
  const newtab = document.getElementById('browser-newtab-page');
  if (newtab) newtab.style.display = 'flex';
  document.querySelectorAll('.browser-tab-frame').forEach(f => f.classList.remove('active'));
  const urlbar = document.getElementById('browser-url-bar');
  if (urlbar) urlbar.value = '';
  renderBrowserTabs();
}

function closeBrowserTab(id) {
  if (browserTabs.length === 1) {
    browserTabs[0].url = ''; browserTabs[0].title = 'New Tab';
    switchBrowserTab(browserTabs[0].id); return;
  }
  const frame = document.getElementById('browser-frame-' + id);
  if (frame) frame.remove();
  browserTabs = browserTabs.filter(t => t.id !== id);
  if (activeTabId === id) activeTabId = browserTabs[browserTabs.length - 1].id;
  switchBrowserTab(activeTabId);
}

function bfrBack() {
  const frame = document.getElementById('browser-frame-' + activeTabId);
  if (frame && frame.src) try { frame.contentWindow.history.back(); } catch(e) {}
}
function bfrForward() {
  const frame = document.getElementById('browser-frame-' + activeTabId);
  if (frame && frame.src) try { frame.contentWindow.history.forward(); } catch(e) {}
}
function bfrReload() {
  const frame = document.getElementById('browser-frame-' + activeTabId);
  if (frame && frame.src !== 'about:blank') { const s = frame.src; frame.src = ''; frame.src = s; }
}

      <div class="settings-item" style="flex-direction:column;align-items:flex-start;gap:8px">
        <div class="settings-item-label">Wallpaper</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${wallpapers.map((bg, i) => `<div data-wp-idx="${i}" style="width:60px;height:38px;border-radius:6px;cursor:pointer;background:${bg};border:2px solid rgba(255,255,255,0.1);transition:border-color 0.15s" title="Wallpaper ${i+1}"></div>`).join('')}
        </div>
      </div>
      <div class="settings-item">
        <div><div class="settings-item-label">Desktop Icon Size</div></div>
        <select id="icon-size-sel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px">
          <option value="70">Small</option>
          <option value="88" selected>Medium</option>
          <option value="108">Large</option>
        </select>
      </div>
      <div class="settings-item">
        <div><div class="settings-item-label">Clock Format</div></div>
        <select id="clock-fmt-sel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px">
          <option value="24">24-hour</option>
          <option value="12">12-hour</option>
        </select>
      </div>
    `;
    el.querySelectorAll('[data-wp-idx]').forEach(swatch => {
      swatch.addEventListener('click', () => {
        const bg = wallpapers[parseInt(swatch.dataset.wpIdx)];
        document.getElementById('desktop').style.background = bg;
        el.querySelectorAll('[data-wp-idx]').forEach(s => s.style.borderColor = 'rgba(255,255,255,0.1)');
        swatch.style.borderColor = 'var(--accent)';
        notify('Desktop', 'Wallpaper changed!');
      });
    });
    el.querySelector('#icon-size-sel').addEventListener('change', e => {
      const sz = parseInt(e.target.value);
      document.querySelectorAll('.desktop-icon').forEach(ic => { ic.style.width = sz + 'px'; });
    });
    el.querySelector('#clock-fmt-sel').addEventListener('change', e => {
      window._clockFmt = e.target.value;
      updateClock();
    });
    return; // already built innerHTML

  } else if (panel === 'system') {
    el.innerHTML = `
      <div class="settings-section-title">System</div>
      <div class="settings-item">
        <div><div class="settings-item-label">Notifications</div><div class="settings-item-desc">Show system notifications</div></div>
        <div class="toggle on" id="toggle-notifs"></div>
      </div>
      <div class="settings-item">
        <div><div class="settings-item-label">Window Snap</div><div class="settings-item-desc">Snap windows to screen edges</div></div>
        <div class="toggle" id="toggle-snap"></div>
      </div>
      <div class="settings-item">
        <div><div class="settings-item-label">Font Size</div></div>
        <select id="font-size-sel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px">
          <option value="11">Small (11px)</option>
          <option value="13" selected>Default (13px)</option>
          <option value="15">Large (15px)</option>
          <option value="17">XL (17px)</option>
        </select>
      </div>
      <div class="settings-item" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div class="settings-item-label">Terminal Font</div>
        <select id="term-font-sel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px">
          <option value="'IBM Plex Mono',monospace" selected>IBM Plex Mono</option>
          <option value="'Courier New',monospace">Courier New</option>
          <option value="monospace">System Mono</option>
        </select>
      </div>
    `;
    el.querySelector('#toggle-notifs').addEventListener('click', function() { this.classList.toggle('on'); window._notifsEnabled = this.classList.contains('on'); });
    el.querySelector('#toggle-snap').addEventListener('click', function() { this.classList.toggle('on'); window._snapEnabled = this.classList.contains('on'); });
    el.querySelector('#font-size-sel').addEventListener('change', e => {
      document.body.style.fontSize = e.target.value + 'px';
    });
    el.querySelector('#term-font-sel').addEventListener('change', e => {
      document.querySelectorAll('.terminal-body,.term-input,.term-prompt-label').forEach(el2 => el2.style.fontFamily = e.target.value);
    });

  } else if (panel === 'display') {
    el.innerHTML = `
      <div class="settings-section-title">Display</div>
      <div class="settings-item">
        <div><div class="settings-item-label">Theme</div></div>
        <div style="display:flex;gap:8px">
          <div id="theme-dark" style="padding:5px 12px;border-radius:4px;background:var(--accent);color:white;cursor:pointer;font-size:11px">Dark</div>
          <div id="theme-dim" style="padding:5px 12px;border-radius:4px;background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:11px;border:1px solid var(--border)">Dim</div>
          <div id="theme-amoled" style="padding:5px 12px;border-radius:4px;background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:11px;border:1px solid var(--border)">AMOLED</div>
        </div>
      </div>
      <div class="settings-item">
        <div><div class="settings-item-label">Taskbar Position</div></div>
        <select id="taskbar-pos" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px">
          <option value="bottom" selected>Bottom</option>
          <option value="top">Top</option>
        </select>
      </div>
    `;
    const themes = {
      dark:   { bg:'#0d1117', surface:'#161b22', surface2:'#21262d', border:'#30363d', text:'#c9d1d9', 'text-dim':'#8b949e', 'text-bright':'#f0f6fc', glass:'rgba(12,16,22,0.72)' },
      dim:    { bg:'#22272e', surface:'#2d333b', surface2:'#373e47', border:'#444c56', text:'#cdd9e5', 'text-dim':'#909dab', 'text-bright':'#e6edf3', glass:'rgba(26,31,37,0.72)' },
      amoled: { bg:'#000000', surface:'#0a0a0a', surface2:'#111111', border:'#1e1e1e', text:'#e0e0e0', 'text-dim':'#777777', 'text-bright':'#ffffff', glass:'rgba(0,0,0,0.82)' },
    };
    ['dark','dim','amoled'].forEach(t => {
      el.querySelector('#theme-'+t).addEventListener('click', () => {
        const th = themes[t];
        Object.entries(th).forEach(([k,v]) => {
          document.documentElement.style.setProperty('--'+k, v);
        });
        // Update all open window backgrounds
        document.querySelectorAll('.window').forEach(w => {
          w.style.background = th.glass;
        });
        // Highlight active button
        ['dark','dim','amoled'].forEach(t2 => {
          const b = el.querySelector('#theme-'+t2);
          if (b) { b.style.background = t2===t ? 'var(--accent)' : 'var(--surface2)'; b.style.color = t2===t ? 'white' : 'var(--text-dim)'; }
        });
        notify('Display', `Theme: ${t.charAt(0).toUpperCase()+t.slice(1)}`);
      });
    });
    el.querySelector('#taskbar-pos').addEventListener('change', e => {
      const tb = document.getElementById('taskbar');
      const desk = document.getElementById('desktop');
      if (e.target.value === 'top') {
        tb.style.top = '0'; tb.style.bottom = 'auto';
        desk.style.top = '44px'; desk.style.bottom = '0'; desk.style.height = 'calc(100vh - 44px)';
      } else {
        tb.style.bottom = '0'; tb.style.top = 'auto';
        desk.style.bottom = '44px'; desk.style.top = '0'; desk.style.height = 'calc(100vh - 44px)';
      }
    });

  } else if (panel === 'network') {
    el.innerHTML = `
      <div class="settings-section-title">Network</div>
      <div class="settings-item"><div><div class="settings-item-label">Wi-Fi</div><div class="settings-item-desc">HyperNet_5G · Connected</div></div><div class="toggle on" id="toggle-wifi"></div></div>
      <div class="settings-item"><div><div class="settings-item-label">Bluetooth</div><div class="settings-item-desc">No devices paired</div></div><div class="toggle" id="toggle-bt"></div></div>
      <div class="settings-item"><div><div class="settings-item-label">Firewall</div><div class="settings-item-desc">Block incoming connections</div></div><div class="toggle on" id="toggle-fw"></div></div>
      <div class="settings-item"><div><div class="settings-item-label">VPN</div><div class="settings-item-desc">Disconnected</div></div><div class="toggle" id="toggle-vpn"></div></div>
    `;
    ['wifi','bt','fw','vpn'].forEach(id => {
      el.querySelector('#toggle-'+id).addEventListener('click', function() { this.classList.toggle('on'); });
    });

  } else if (panel === 'about') {
    el.innerHTML = `
      <div class="settings-section-title">About HyperZOS</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div style="font-size:52px">💻</div>
        <div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--accent);font-weight:600">HyperZOS</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Version 1.0.0 (Build 2025.1)</div>
        </div>
      </div>
      <div class="settings-item"><div class="settings-item-label">Kernel</div><div style="font-size:11px;color:var(--accent);font-family:'IBM Plex Mono',monospace">6.8.2-hyperzos</div></div>
      <div class="settings-item"><div class="settings-item-label">Shell</div><div style="font-size:11px;color:var(--text-dim)">HyperShell 2.0</div></div>
      <div class="settings-item"><div class="settings-item-label">Memory</div><div style="font-size:11px;color:var(--text-dim)">8 GB simulated</div></div>
      <div class="settings-item"><div class="settings-item-label">Display</div><div style="font-size:11px;color:var(--text-dim)" id="about-res"></div></div>
      <div class="settings-item"><div class="settings-item-label">Built with</div><div style="font-size:11px;color:var(--text-dim)">HTML5 + Vanilla JS</div></div>
      <div class="settings-item"><div class="settings-item-label">Storage Used</div><div style="font-size:11px;color:var(--text-dim)" id="about-storage"></div></div>
    `;
    document.getElementById('about-res').textContent = `${window.innerWidth} × ${window.innerHeight}`;
    const storageSize = JSON.stringify(fileContents).length;
    document.getElementById('about-storage').textContent = `~${(storageSize/1024).toFixed(1)} KB`;
  }
}

function setAccent(color, el) {
  document.documentElement.style.setProperty('--accent', color);
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  notify('Appearance', 'Accent color updated!');
}

function buildClock() {
  return `
    <div class="clock-body">
      <div class="clock-digital" id="clock-digital">00:00:00</div>
      <div class="clock-date" id="clock-date-display"></div>
      <canvas class="clock-canvas" id="analog-clock" width="180" height="180"></canvas>
    </div>
  `;
}

// ========================
// EDITOR HELPERS
// ========================
function insertText(before, after) {
  const ta = document.getElementById('editor-ta');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0,s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus();
}

function newEditorFile() {
  const ta = document.getElementById('editor-ta');
  const fn = document.getElementById('ed-filename');
  if (ta) ta.value = '';
  if (fn) fn.value = 'untitled.txt';
}

function copyEditorContent() {
  const ta = document.getElementById('editor-ta');
  if (ta) { navigator.clipboard.writeText(ta.value).then(() => notify('Editor', 'Content copied to clipboard!')); }
}

function seekMusic(e) {
  const bar = e.currentTarget;
  const pct = e.offsetX / bar.offsetWidth * 100;
  musicProgress = pct;
  updateMusicProgress();
}

// ========================
// NOTIFICATIONS
// ========================
function notify(title, body) {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${escHtml(title)}</div><div class="notif-body">${escHtml(body)}</div>`;
  container.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity 0.4s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
}

// ========================
// START MENU
// ========================
function toggleStartMenu() {
  const menu = document.getElementById('start-menu');
  menu.classList.toggle('open');
}
function closeStartMenu() {
  document.getElementById('start-menu').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) closeStartMenu();
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
});

// ========================
// CONTEXT MENU
// ========================
function showCtxMenu(x, y, items) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = items.map(item =>
    item.sep ? '<div class="ctx-sep"></div>'
             : `<div class="ctx-item" onclick="(${item.action.toString()})()">${item.label}</div>`
  ).join('');
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
  menu.style.display = 'block';
}
function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }

// ========================
// SHUTDOWN
// ========================
function shutdown() {
  closeStartMenu();
  const boot = document.getElementById('boot');
  boot.classList.remove('hidden');
  boot.style.opacity = '1';
  boot.style.transition = 'opacity 0.4s';
  boot.innerHTML = `
    <div class="boot-logo" style="color:var(--accent3);font-size:28px">Shutting down...</div>
    <div class="boot-sub" style="margin-top:8px">HyperZOS — Goodbye</div>
  `;
  // After 1s, show power-on button
  setTimeout(() => {
    boot.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
        <div class="boot-logo" style="color:var(--text-dim);font-size:22px;letter-spacing:0.15em">SYSTEM OFF</div>
        <button id="power-on-btn" onclick="powerOn()" style="
          width:64px;height:64px;border-radius:50%;
          background:radial-gradient(circle at 35% 35%, #1f3a52, #0d1117);
          border:2px solid rgba(88,166,255,0.4);
          color:var(--accent);font-size:26px;cursor:pointer;
          box-shadow:0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6);
          transition:all 0.2s;display:flex;align-items:center;justify-content:center;
        " onmouseover="this.style.boxShadow='0 0 32px rgba(88,166,255,0.5), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.8)'"
           onmouseout="this.style.boxShadow='0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.4)'">
          ⏻
        </button>
        <div style="font-size:11px;color:var(--text-dim);letter-spacing:0.1em">Press to turn on</div>
      </div>
    `;
  }, 1200);
}

function powerOn() {
  const boot = document.getElementById('boot');
  // First make sure boot is fully visible (remove hidden class, reset opacity)
  boot.style.opacity = '1';
  boot.style.transition = 'none';
  boot.style.pointerEvents = 'auto';
  boot.classList.remove('hidden');

  boot.innerHTML = `
    <div class="boot-logo">HyperZOS</div>
    <div class="boot-sub">Version 1.0.0 · Kernel 6.8.2</div>
    <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar" style="width:0;transition:width 2.2s ease"></div></div>
    <div class="boot-ver">© 2025 HyperZOS Systems. All rights reserved.</div>
  `;

  // Force a reflow so the browser registers the initial width:0 before animating
  const bar = document.getElementById('boot-bar');
  bar.getBoundingClientRect(); // trigger reflow
  // Use rAF to ensure paint happens before we set width
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.width = '100%';
    });
  });

  setTimeout(() => {
    boot.style.transition = 'opacity 0.5s';
    boot.style.opacity = '0';
    setTimeout(() => {
      boot.classList.add('hidden');
      boot.style.opacity = '';
      boot.style.transition = '';
      boot.style.pointerEvents = '';
      const login = document.getElementById('login-screen');
      login.classList.remove('login-screen-hidden');
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').style.display = 'none';
      setTimeout(() => document.getElementById('login-password').focus(), 100);
    }, 500);
  }, 2500);
}

// ========================
// UTILS
// ========================
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initNotes() {
  renderNotesList();
  selectNote(activeNote);
}
</script>
