function buildCalc() {
  const btns = [
    ['C','⌫','%','÷'],
    ['7','8','9','×'],
    ['4','5','6','-'],
    ['1','2','3','+'],
    ['0','.','='],
  ];
  return `
    <div class="calc-body">
      <div class="calc-display">
        <div class="calc-expr" id="calc-display-expr"></div>
        <div class="calc-val" id="calc-display-val">0</div>
      </div>
      <div class="calc-grid">
        ${btns.map(row => row.map((b,i) => {
          const cls = b==='='?'eq':b==='C'?'clear':['+','-','×','÷','%'].includes(b)?'op':'';
          const span = b==='0'&&row.length<4?' span2':'';
          return `<div class="calc-btn ${cls}${span}" onclick="calcInput('${b}')">${b}</div>`;
        }).join('')).join('')}
      </div>
    </div>
  `;
}

function applyFontSize(px) {
  /* Inject/update a <style> tag that overrides font-size across UI text elements */
  let style = document.getElementById('fs-override-style');
  if (!style) {
    style = document.createElement('style');
    style.id = 'fs-override-style';
    document.head.appendChild(style);
  }
  const sm  = Math.max(8,  px - 2);
  const xs  = Math.max(7,  px - 3);
  const lg  = px + 2;
  const xl  = px + 4;
  style.textContent = `
    body, .window-body, .settings-body, .notes-body,
    .taskbar-item, .sm-app, .ctx-item, .titlebar-title,
    .term-output, .term-input { font-size: ${px}px !important; }
    .settings-item-label { font-size: ${px}px !important; }
    .settings-item-desc, .tab-close, .browser-tab,
    .taskbar-item { font-size: ${sm}px !important; }
    .calc-val { font-size: ${xl}px !important; }
    .clock-digital { font-size: ${Math.round(px * 3.2)}px !important; }
  `;
}

function applyAnimationSetting(on) {
  window._animationsOn = on;
  document.documentElement.style.setProperty('--anim-speed', on ? '0.15s' : '0s');
  let style = document.getElementById('anim-kill-style');
  if (!on) {
    if (!style) {
      style = document.createElement('style');
      style.id = 'anim-kill-style';
      document.head.appendChild(style);
    }
    style.textContent = `
      *, *::before, *::after {
        animation-duration: 0s !important;
        animation-delay: 0s !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }
    `;
  } else {
    if (style) style.remove();
  }
}

function setAccent(color, el) {
  settingsState.accentColor = color;
  document.documentElement.style.setProperty('--accent', color);
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');

// ========================
// EDITOR HELPERS
// ========================
function insertText(before, after) {
  const ta = document.getElementById('editor-ta');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0,s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus();
}

function newEditorFile() {
  const ta = document.getElementById('editor-ta');
  const fn = document.getElementById('ed-filename');
  if (ta) ta.value = '';
  if (fn) fn.value = 'untitled.txt';
}

function copyEditorContent() {
  const ta = document.getElementById('editor-ta');
  if (ta) { navigator.clipboard.writeText(ta.value).then(() => notify('Editor', 'Content copied to clipboard!')); }
}

function seekMusic(e) {
  const bar = e.currentTarget;
  const pct = e.offsetX / bar.offsetWidth * 100;
  musicProgress = pct;
  updateMusicProgress();
}

// ========================
// NOTIFICATIONS
// ========================
function notify(title, body) {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${escHtml(title)}</div><div class="notif-body">${escHtml(body)}</div>`;
  container.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity 0.4s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
}

// ========================
// START MENU
// ========================
function toggleStartMenu() {
  const menu = document.getElementById('start-menu');
  if (menu.classList.contains('open')) {
    closeStartMenu();
  } else {
    menu.classList.remove('closing');
    menu.classList.add('open');
  }
}
function closeStartMenu() {
  const menu = document.getElementById('start-menu');
  if (!menu.classList.contains('open')) return;
  menu.classList.add('closing');
  menu.addEventListener('animationend', () => {
    menu.classList.remove('open', 'closing');
  }, { once: true });
  // Fallback
  setTimeout(() => menu.classList.remove('open', 'closing'), 300);
}
// Dismiss start-menu on click outside; dismiss ctx-menu on mousedown outside
document.addEventListener('click', e => {
  if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) closeStartMenu();
});
// Use a flag to prevent the dismiss-on-mousedown from firing on the same
// mousedown that OPENED the context menu (right-click → mousedown fires first in FF)
let _ctxJustOpened = false;
document.addEventListener('mousedown', e => {
  if (_ctxJustOpened) { _ctxJustOpened = false; return; }
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
});

// ========================
// OS DIALOG (replaces prompt/confirm for Firefox compatibility)
// ========================
function _osDialog({ title, msg, input, defaultVal, buttons }) {
  return new Promise(resolve => {
    const overlay = document.getElementById('os-dialog-overlay');
    const titleEl = document.getElementById('os-dialog-title');
    const msgEl   = document.getElementById('os-dialog-msg');
    const inputEl = document.getElementById('os-dialog-input');
    const btnsEl  = document.getElementById('os-dialog-btns');

    titleEl.textContent = title || '';
    msgEl.textContent   = msg   || '';
    msgEl.style.display = msg ? 'block' : 'none';

    if (input) {
      inputEl.style.display = 'block';
      inputEl.value = defaultVal || '';
    } else {
      inputEl.style.display = 'none';
    }

    btnsEl.innerHTML = '';
    const cleanup = val => {
      overlay.classList.remove('open');
      overlay.onkeydown = null;
      resolve(val);
    };

    buttons.forEach(btn => {
      const el = document.createElement('button');
      el.className = 'os-dialog-btn' + (btn.primary ? ' primary' : '') + (btn.danger ? ' danger' : '');
      el.textContent = btn.label;
      el.onclick = () => cleanup(btn.value === 'INPUT' ? inputEl.value.trim() : btn.value);
      btnsEl.appendChild(el);
    });

    overlay.classList.add('open');
    overlay.onkeydown = e => {
      if (e.key === 'Escape') { cleanup(null); }
      if (e.key === 'Enter' && input) {
        // Enter confirms
        const primaryBtn = buttons.find(b => b.primary);
        if (primaryBtn) cleanup(primaryBtn.value === 'INPUT' ? inputEl.value.trim() : primaryBtn.value);
      }
    };

    // Focus input or first button
    setTimeout(() => {
      if (input) { inputEl.focus(); inputEl.select(); }
      else { const first = btnsEl.querySelector('.primary,.os-dialog-btn'); if (first) first.focus(); }
    }, 30);
  });
}

function osPrompt(title, defaultVal, msg) {
  return _osDialog({
    title,
    msg: msg || '',
    input: true,
    defaultVal: defaultVal || '',
    buttons: [
      { label: 'Cancel', value: null },
      { label: 'OK',     value: 'INPUT', primary: true },
    ]
  });
}

function osConfirm(title, msg, confirmLabel, dangerConfirm) {
  const isCustom = !!confirmLabel;
  const confirmBtn = { label: confirmLabel || 'Delete', value: true, danger: !isCustom, primary: isCustom };
  const cancelBtn  = { label: 'Cancel', value: false };
  return _osDialog({
    title,
    msg,
    input: false,
    buttons: isCustom ? [confirmBtn, cancelBtn] : [cancelBtn, confirmBtn],
  });
}

// ========================
// CONTEXT MENU
// ========================
let _ctxActions = [];
function showCtxMenu(x, y, items) {
  const menu = document.getElementById('ctx-menu');
  _ctxActions = [];
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.sep) {
      const sep = document.createElement('div');
      sep.className = 'ctx-sep';
      menu.appendChild(sep);
    } else {
      const actionIdx = _ctxActions.length;
      _ctxActions.push(item.action);
      const el = document.createElement('div');
      el.className = 'ctx-item';
      el.textContent = item.label;
      // Use mousedown so action fires before the global mousedown-dismiss listener
      // stopPropagation prevents the global mousedown from hiding the menu before action runs
      el.addEventListener('mousedown', e => {
        e.stopPropagation();
        hideCtxMenu();
        _ctxActions[actionIdx]();
      });
      menu.appendChild(el);
    }
  });
  // Set flag so the mousedown that triggered this right-click doesn't immediately
  // dismiss the menu we're about to show (Firefox fires mousedown before contextmenu)
  _ctxJustOpened = true;
  // Show offscreen first to measure, then reposition and animate
  menu.style.visibility = 'hidden';
  menu.style.display = 'block';
  menu.classList.remove('ctx-visible');
  // Force reflow so animation replays correctly in Firefox
  void menu.offsetWidth;
  const mw = menu.offsetWidth || 180;
  const mh = menu.offsetHeight || 200;
  menu.style.left = Math.min(x, window.innerWidth - mw - 4) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - mh - 4) + 'px';
  menu.style.visibility = '';
  menu.classList.add('ctx-visible');
}
function hideCtxMenu() {
  const menu = document.getElementById('ctx-menu');
  if (menu) { menu.style.display = 'none'; menu.classList.remove('ctx-visible'); }
}
// ========================
// SHUTDOWN
// ========================
function shutdown() {
  closeStartMenu();
  const boot = document.getElementById('boot');
  boot.classList.remove('hidden');
  boot.style.opacity = '1';
  boot.style.transition = 'opacity 0.4s';
  boot.innerHTML = `
    <div class="boot-logo" style="color:var(--accent3);font-size:28px">Shutting down...</div>
    <div class="boot-sub" style="margin-top:8px">HyperZOS — Goodbye</div>
  `;
  // After 1s, show power-on button
  setTimeout(() => {
    boot.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
        <div class="boot-logo" style="color:var(--text-dim);font-size:22px;letter-spacing:0.15em">SYSTEM OFF</div>
        <button id="power-on-btn" onclick="powerOn()" style="
          width:64px;height:64px;border-radius:50%;
          background:radial-gradient(circle at 35% 35%, #1f3a52, #0d1117);
          border:2px solid rgba(88,166,255,0.4);
          color:var(--accent);font-size:26px;cursor:pointer;
          box-shadow:0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6);
          transition:all 0.2s;display:flex;align-items:center;justify-content:center;
        " onmouseover="this.style.boxShadow='0 0 32px rgba(88,166,255,0.5), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.8)'"
           onmouseout="this.style.boxShadow='0 0 20px rgba(88,166,255,0.2), 0 4px 16px rgba(0,0,0,0.6)';this.style.borderColor='rgba(88,166,255,0.4)'">
          ⏻
        </button>
        <div style="font-size:11px;color:var(--text-dim);letter-spacing:0.1em">Press to turn on</div>
      </div>
    `;
  }, 1200);
}

function powerOn() {
  const boot = document.getElementById('boot');
  // First make sure boot is fully visible (remove hidden class, reset opacity)
  boot.style.opacity = '1';
  boot.style.transition = 'none';
  boot.style.pointerEvents = 'auto';
  boot.classList.remove('hidden');

  boot.innerHTML = `
    <div class="boot-logo">HyperZOS</div>
    <div class="boot-sub">Version 1.0.0 · Kernel 6.8.2</div>
    <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar" style="width:0;transition:width 2.2s ease"></div></div>
    <div class="boot-ver">© 2025 HyperZOS Systems. All rights reserved.</div>
  `;

  // Force a reflow so the browser registers the initial width:0 before animating
  const bar = document.getElementById('boot-bar');
  bar.getBoundingClientRect(); // trigger reflow
  // Use rAF to ensure paint happens before we set width
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.width = '100%';
    });
  });

  setTimeout(() => {
    boot.style.transition = 'opacity 0.5s';
    boot.style.opacity = '0';
    setTimeout(() => {
      boot.classList.add('hidden');
      boot.style.opacity = '';
      boot.style.transition = '';
      boot.style.pointerEvents = '';
      const login = document.getElementById('login-screen');
      login.classList.remove('login-screen-hidden');
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').style.display = 'none';
      setTimeout(() => document.getElementById('login-password').focus(), 100);
    }, 500);
  }, 2500);
}

// ========================
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initNotes() {
  renderNotesList();
  selectNote(activeNote);
}
